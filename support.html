<!-- Support Modal -->
<div id="supportModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[60] p-4">
    <div class="glass rounded-3xl max-w-md w-full p-8 text-center animate-in fade-in duration-300">
        <div class="text-6xl mb-6">🌱</div>
        <h2 class="text-3xl font-bold text-emerald-400 mb-2">Support the Square</h2>
        <p class="text-zinc-400 mb-8 text-sm">Contribute directly to the VocalWitness truth ledger. Your support maintains our infrastructure.</p>
        
        <div class="bg-zinc-950 p-6 rounded-2xl border border-zinc-800 mb-6">
            <p class="text-xs text-zinc-500 uppercase tracking-widest mb-2">USDT (TRC20) Address</p>
            <code id="walletAddress" class="text-emerald-300 break-all font-mono text-sm">TXYZ123456789YOURWALLETADDRESSHERE</code>
            
            <button onclick="copyWalletAddress()" class="mt-4 w-full py-2 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 rounded-xl text-sm font-medium transition-all flex items-center justify-center gap-2">
                <span id="copyIcon">📋</span> <span id="copyText">Copy Address</span>
            </button>
        </div>

        <p class="text-[10px] text-zinc-600 mb-8 uppercase italic">Only send USDT on the TRC20 network.</p>

        <button onclick="document.getElementById('supportModal').classList.add('hidden')" class="w-full py-3 text-zinc-400 hover:text-white transition-colors">
            Close
        </button>
    </div>
</div>

<script>
    function copyWalletAddress() {
        const address = document.getElementById('walletAddress').innerText;
        navigator.clipboard.writeText(address).then(() => {
            const copyText = document.getElementById('copyText');
            const copyIcon = document.getElementById('copyIcon');
            
            copyText.innerText = "Copied!";
            copyIcon.innerText = "✅";
            
            setTimeout(() => {
                copyText.innerText = "Copy Address";
                copyIcon.innerText = "📋";
            }, 2000);
        });
    }
</script>

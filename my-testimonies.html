<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Testimonies • VocalWitness</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0f1c; color: #e2e8f0; }
        .glass { background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.25); }
    </style>
</head>
<body class="min-h-screen bg-[#0a0f1c]">

    <div class="max-w-3xl mx-auto p-6">
        <header class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-3">
                <a href="index.html" class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-2xl">🔊</div>
                    <div>
                        <h1 class="text-2xl font-bold">VocalWitness</h1>
                    </div>
                </a>
            </div>
            <a href="index.html" class="text-emerald-400 hover:text-emerald-300">← Back to Square</a>
        </header>

        <div class="glass rounded-3xl p-8">
            <h1 class="text-3xl font-bold mb-2">My Testimonies</h1>
            <p class="text-zinc-400 mb-8">Permanent records of your voice in the Public Square</p>
            
            <div id="myTestimoniesContainer" class="space-y-6 min-h-[400px]">
                <!-- JS will load here -->
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/my-testimonies.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initMyTestimonies === 'function') {
                initMyTestimonies('myTestimoniesContainer');
            }
        });
    </script>
</body>
</html>

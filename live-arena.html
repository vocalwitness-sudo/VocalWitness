<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <meta http-equiv="Content-Security-Policy" 
      content="default-src 'self' https: wss: blob: data:;
               script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://www.gstatic.com;
               style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;
               connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com wss://*.firebaseio.com;
               img-src 'self' https: data: blob:;
               font-src 'self' https: data:;
               object-src 'none';
               base-uri 'self';">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/logo.png" type="image/png">
    <title>Live Arena • VocalWitness</title>
   
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
   
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0f1c; color: white; }
        .glass { background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.25); }
    </style>
</head>
<body class="min-h-screen pb-20 p-4 bg-[#0a0f1c]">

    <div class="max-w-2xl mx-auto">
        <!-- HEADER -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <button onclick="window.goBack()" 
                        class="px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center gap-2 text-sm">
                    ← Back
                </button>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-red-500 to-rose-500 rounded-2xl flex items-center justify-center text-2xl">🏟️</div>
                    <div>
                        <h1 class="text-3xl font-bold tracking-tighter text-rose-400">Live Arena</h1>
                        <p class="text-xs text-rose-500">Real-time Public Debate</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="glass rounded-3xl p-6 text-center">
            <div class="py-20">
                <div class="text-6xl mb-6">🏟️</div>
                <h2 class="text-2xl font-bold mb-3">Live Arena</h2>
                <p class="text-zinc-400 mb-8">Real-time discussions and debates are coming soon.</p>
                <button onclick="alert('Live Arena feature is under development')" 
                        class="px-8 py-4 bg-gradient-to-r from-rose-500 to-pink-500 text-black font-bold rounded-2xl">
                    Notify Me When Live
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/utils.js"></script>
    <script>
        window.goBack = window.goBack || function() {
            if (window.history.length > 1) window.history.back();
            else window.location.href = 'index.html';
        };
    </script>
    <script type="module" src="../js/main.js"></script>
</body>
</html>

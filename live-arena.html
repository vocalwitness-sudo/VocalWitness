<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/logo.png" type="image/png">
    <title>VocalWitness • Live Arena</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        .live-dot {
            animation: pulse-live 2s infinite;
        }
        @keyframes pulse-live {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body class="min-h-screen pb-20 p-4 bg-[#0a0f1c]">
    <!-- Legal Notice -->
    <div class="max-w-2xl mx-auto bg-red-950/30 border border-red-500/20 rounded-3xl p-4 text-xs mb-6 text-center">
        <strong class="text-red-400">Legal:</strong> VocalWitness is an un-manipulated decentralized distribution medium.
    </div>

    <div class="max-w-2xl mx-auto">
        <!-- HEADER -->
        <header class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🔊</div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tighter text-emerald-400">VocalWitness</h1>
                    <p class="text-xs text-emerald-500 -mt-1">Live Arena • Real-time Square</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 bg-emerald-900/50 px-4 py-2 rounded-2xl text-sm">
                    <span class="w-3 h-3 bg-emerald-500 rounded-full live-dot"></span>
                    <span class="font-medium text-emerald-400">LIVE</span>
                </div>
                <button id="btn-profile" class="w-11 h-11 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-3xl transition-all border border-zinc-600 flex items-center justify-center">👤</button>
            </div>
        </header>

        <!-- Live Arena Header -->
        <div class="glass rounded-3xl p-8 mb-8 text-center">
            <div class="text-6xl mb-6">🎥</div>
            <h2 class="text-4xl font-bold mb-3">Live Arena</h2>
            <p class="text-emerald-300">Real-time Testimonies • Verified Voices Only</p>
        </div>

        <!-- Live Status -->
        <div class="glass rounded-3xl p-6 mb-8">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">🔴</span>
                    <div>
                        <p class="font-semibold">Live Sessions</p>
                        <p class="text-sm text-emerald-400">12 witnesses online</p>
                    </div>
                </div>
                <button onclick="joinLiveSession()" 
                        class="px-8 py-3 bg-red-600 hover:bg-red-700 rounded-2xl font-bold">
                    Join Live Broadcast
                </button>
            </div>
        </div>

        <!-- Feed -->
        <div id="feedContainer" class="w-full"></div>
    </div>

    <script>
        tailwind.config = { content: ["./**/*.{html,js}"] };
        
        function joinLiveSession() {
            alert("🎤 Live Arena coming soon! High-trust users will be able to broadcast live testimonies.");
        }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">

    <!-- CSP -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self' https: wss: blob: data:;
                   script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://www.gstatic.com https://www.gstatic.com/firebasejs/;
                   style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;
                   connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com wss://*.firebaseio.com;
                   img-src 'self' https: data: blob:;
                   font-src 'self' https: data:;
                   media-src 'self' https: blob:;
                   object-src 'none';
                   base-uri 'self';
                   frame-ancestors 'none';">

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="logo.png" type="image/png">
    <title>Live Arena • VocalWitness</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">

    <style>
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: #0a0f1c; 
            color: white; 
        }
        .glass { 
            background: rgba(17, 24, 39, 0.95); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(16, 185, 129, 0.25); 
        }
        .arena-placeholder {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
        }
    </style>
</head>
<body class="min-h-screen pb-20 p-4 bg-[#0a0f1c]">

    <div class="max-w-2xl mx-auto">
        <!-- HEADER -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <button onclick="window.goBack()"
                        class="px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center gap-2 text-sm font-medium">
                    ← Back
                </button>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-red-500 to-rose-500 rounded-2xl flex items-center justify-center text-2xl shadow-inner">🏟️</div>
                    <div>
                        <h1 class="text-3xl font-bold tracking-tighter text-rose-400">Live Arena</h1>
                        <p class="text-xs text-rose-500 -mt-1">Real-time Public Debate</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="glass rounded-3xl p-8 text-center">
            <div class="py-16">
                <div class="text-7xl mb-8">🏟️</div>
                <h2 class="text-3xl font-bold mb-4 text-white">Live Arena</h2>
                <p class="text-zinc-400 text-lg max-w-md mx-auto mb-10">
                    Real-time discussions, debates, and public testimonies are coming soon.
                </p>
                
                <div class="arena-placeholder rounded-3xl p-10 mb-10 text-white">
                    <p class="text-xl font-medium mb-2">🚧 Under Construction</p>
                    <p class="text-sm opacity-75">The Arena will open when we reach 500 verified witnesses</p>
                </div>

                <button onclick="notifyLiveArena()"
                        class="px-10 py-4 bg-gradient-to-r from-rose-500 to-pink-500 hover:from-rose-600 hover:to-pink-600 text-black font-bold rounded-3xl text-lg shadow-xl transition-all active:scale-95">
                    🔔 Notify Me When Arena Goes Live
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/utils.js"></script>
    <script>
        window.goBack = function() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        };

        function notifyLiveArena() {
            alert("✅ You'll be notified when the Live Arena launches!\n\nThank you for your patience.");
        }
    </script>
    <script type="module" src="../js/main.js"></script>
</body>
</html>

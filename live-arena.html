<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/logo.png" type="image/png">
    <title>VocalWitness • Live Arena</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        .live-dot {
            animation: pulse-live 2s infinite;
        }
        @keyframes pulse-live {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body class="min-h-screen pb-20 p-4 bg-[#0a0f1c]">
    <!-- Legal Notice -->
    <div class="max-w-2xl mx-auto bg-red-950/30 border border-red-500/20 rounded-3xl p-4 text-xs mb-6 text-center">
        <strong class="text-red-400">Legal:</strong> VocalWitness is an un-manipulated decentralized distribution medium.
    </div>

    <div class="max-w-2xl mx-auto">
        <!-- HEADER -->
        <header class="bg-zinc-950 border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-4">
        <!-- Back Button -->
        <button onclick="goBack()" 
                class="lg:hidden flex items-center gap-2 text-zinc-400 hover:text-white transition-all px-3 py-2 rounded-2xl hover:bg-zinc-900">
            ← Back
        </button>
        
        <button id="mobile-menu-btn" class="lg:hidden text-3xl p-2">☰</button>
        
        <div class="text-2xl font-semibold text-white">🔬 True Witness</div>
        <!-- Change title dynamically per page -->
    </div>

    <div class="flex items-center gap-4">
        <select id="languageSelector" class="bg-zinc-900 border border-zinc-700 text-white px-5 py-2.5 rounded-2xl text-sm"></select>
        <button onclick="window.toggleNotifications()" class="w-10 h-10 flex items-center justify-center text-2xl relative hover:bg-zinc-900 rounded-2xl">🛎️</button>
        <button onclick="window.showProfile()" class="w-11 h-11 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-3xl">👤</button>
    </div>
</header>

        <!-- Live Arena Header -->
        <div class="glass rounded-3xl p-8 mb-8 text-center">
            <div class="text-6xl mb-6">🎥</div>
            <h2 class="text-4xl font-bold mb-3">Live Arena</h2>
            <p class="text-emerald-300">Real-time Testimonies • Verified Voices Only</p>
        </div>

        <!-- Live Status -->
        <div class="glass rounded-3xl p-6 mb-8">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">🔴</span>
                    <div>
                        <p class="font-semibold">Live Sessions</p>
                        <p class="text-sm text-emerald-400">12 witnesses online</p>
                    </div>
                </div>
                <button onclick="joinLiveSession()" 
                        class="px-8 py-3 bg-red-600 hover:bg-red-700 rounded-2xl font-bold">
                    Join Live Broadcast
                </button>
            </div>
        </div>

        <!-- Feed -->
        <div id="feedContainer" class="w-full"></div>
    </div>

    <script>
        tailwind.config = { content: ["./**/*.{html,js}"] };
        
        function joinLiveSession() {
            alert("🎤 Live Arena coming soon! High-trust users will be able to broadcast live testimonies.");
        }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en-NG">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#10b981">

  <!-- CSP - Must be inside <head> -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https: wss: blob: data:;
                 script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://www.gstatic.com;
                 style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;
                 connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com wss://*.firebaseio.com;
                 img-src 'self' https: data: blob:;
                 font-src 'self' https: data:;
                 object-src 'none';
                 base-uri 'self';
                 frame-ancestors 'none';">

  <title>VocalWitness • Truth • Evidence • Public Square</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

  <style>
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background: #0a0f1c; 
      color: white; 
    }
    .glass {
      background: rgba(17, 24, 39, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(16, 185, 129, 0.25);
    }
    .admin-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      display: none;
    }
    .modal-content {
      background: #111827;
      margin: 5% auto;
      padding: 2rem;
      max-width: 1000px;
      border-radius: 16px;
      border: 1px solid #10b981;
    }
  </style>
</head>
<body class="min-h-screen pb-20 p-4 bg-[#0a0f1c]">

  <!-- LEGAL NOTICE -->
  <div class="max-w-2xl mx-auto bg-red-950/30 border border-red-500/20 rounded-3xl p-4 text-xs mb-6 text-center">
    <strong class="text-red-400">Legal:</strong> VocalWitness is an un-manipulated decentralized distribution medium.
  </div>

  <div class="max-w-2xl mx-auto">
    <!-- HEADER, NAV, COMPOSER, FEED, FOOTER here... (same as before) -->
    <!-- I omitted the long repeated part for brevity. Paste your main content here. -->
  </div>

  <!-- ==================== ADMIN DASHBOARD ==================== -->
  <!-- Admin Link -->
  <button id="admin-link" class="hidden fixed bottom-4 right-4 bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-2xl text-sm font-medium shadow-xl z-50">
    ⚙️ Admin Dashboard
  </button>

  <!-- Admin Dashboard Modal -->
  <div id="admin-dashboard" class="admin-modal">
    <div class="modal-content">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">🔧 System Command Center (Owner/Admin)</h2>
        <button onclick="closeAdminDashboard()" class="text-3xl text-zinc-400 hover:text-white">×</button>
      </div>

      <p id="admin-status" class="mb-6"></p>

      <div class="dashboard-tabs flex gap-2 mb-6 border-b border-zinc-700">
        <button onclick="showTab(0)" class="tab-btn active px-6 py-2">Users Management</button>
        <button onclick="showTab(1)" class="tab-btn px-6 py-2">System Stats</button>
      </div>

      <!-- Users Tab -->
      <div id="tab-0">
        <table id="admin-user-table" class="w-full">
          <thead>
            <tr class="border-b border-zinc-700">
              <th class="text-left py-3">Avatar</th>
              <th class="text-left py-3">Name</th>
              <th class="text-left py-3">Email</th>
              <th class="text-left py-3">Role</th>
              <th class="text-left py-3">Actions</th>
            </tr>
          </thead>
          <tbody id="admin-user-list"></tbody>
        </table>
      </div>

      <!-- Stats Tab -->
      <div id="tab-1" class="hidden">
        <h3 class="text-xl font-semibold mb-4">Platform Statistics</h3>
        <div id="system-stats"></div>
      </div>
    </div>
  </div>

  <!-- Your other modals (Support, Profile, etc.) go here -->

  <script>
    // Admin functions
    function closeAdminDashboard() {
      document.getElementById('admin-dashboard').style.display = 'none';
    }

    function showTab(n) {
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === n);
      });
      document.getElementById('tab-0').classList.toggle('hidden', n !== 0);
      document.getElementById('tab-1').classList.toggle('hidden', n !== 1);
    }

    // Show admin button for testing (remove or secure in production)
    // document.getElementById('admin-link').classList.remove('hidden');

    // Existing functions...
    function toggleMoreMenu() { ... }
    // ... your other functions
  </script>

  <script type="module" src="js/main.js"></script>
</body>
</html>

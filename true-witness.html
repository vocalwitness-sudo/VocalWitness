<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    
    <!-- CSP -->
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self';
                   script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://www.gstatic.com https://checkout.flutterwave.com;
                   style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com;
                   font-src 'self' https://fonts.gstatic.com;">

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/logo.png" type="image/png">
    <title>True Witness • VocalWitness</title>
   
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
   
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0f1c; color: white; }
        .glass { background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.25); }
    </style>
</head>
<body class="min-h-screen pb-20 p-4 bg-[#0a0f1c]">

    <div class="max-w-2xl mx-auto">
        <!-- HEADER -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <button onclick="window.goBack()" 
                        class="px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center gap-2 text-sm">
                    ← Back
                </button>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-amber-500 to-yellow-500 rounded-2xl flex items-center justify-center text-2xl">🔬</div>
                    <div>
                        <h1 class="text-3xl font-bold tracking-tighter text-amber-400">True Witness</h1>
                        <p class="text-xs text-amber-500">ZK Verified • High Trust</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="glass rounded-3xl p-6">
            <h2 class="text-xl font-semibold mb-6">ZK-Verified Testimonies</h2>
            <div id="trueWitnessContainer" class="space-y-6">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/utils.js"></script>
    <script>
        window.goBack = window.goBack || function() {
            if (window.history.length > 1) window.history.back();
            else window.location.href = 'index.html';
        };
    </script>
    <script type="module" src="../js/main.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log("True Witness page loaded");
            // TODO: Load ZK-verified testimonies
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/logo.png" type="image/png">
    <title>VocalWitness • True Witness</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        .forensic-badge { background: linear-gradient(90deg, #10b981, #34d399); }
    </style>
</head>
<body class="min-h-screen pb-20 p-4 bg-[#0a0f1c]">
    <!-- Legal Notice -->
    <div class="max-w-2xl mx-auto bg-red-950/30 border border-red-500/20 rounded-3xl p-4 text-xs mb-6 text-center">
        <strong class="text-red-400">Legal:</strong> VocalWitness is an un-manipulated decentralized distribution medium.
    </div>

    <div class="max-w-2xl mx-auto">
        <!-- HEADER -->
        <header class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🔊</div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tighter text-emerald-400">VocalWitness</h1>
                    <p class="text-xs text-emerald-500 -mt-1">True Witness • Forensic Mode</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button id="btn-profile" class="w-11 h-11 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-3xl transition-all border border-zinc-600 flex items-center justify-center">👤</button>
            </div>
        </header>

        <!-- True Witness Header -->
        <div class="glass rounded-3xl p-8 mb-8 text-center">
            <div class="text-7xl mb-6">🛡️</div>
            <h2 class="text-4xl font-bold mb-3 text-emerald-400">True Witness</h2>
            <p class="text-emerald-300 mb-8">Forensic Shield • ZK Proofs • Verified Evidence</p>
            
            <div class="inline-flex items-center gap-2 bg-emerald-900/50 px-6 py-3 rounded-2xl mb-8">
                <span class="text-emerald-400">🔒</span>
                <span class="font-medium">Only Verified True Witnesses can post here</span>
            </div>
        </div>

        <!-- Forensic Composer -->
        <div class="glass rounded-3xl p-6 mb-8">
            <textarea id="mainInput" rows="4" 
                class="w-full bg-transparent border-0 focus:outline-none text-lg placeholder-zinc-400 resize-none"
                placeholder="Share verified forensic testimony... Include evidence details."></textarea>
            
            <div class="flex gap-3 mt-6">
                <button id="btn-photo" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center justify-center gap-3">
                    📸 Upload Evidence + Hash
                </button>
                <button id="btn-voice" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center justify-center gap-3">
                    🎤 Voice Testimony + ZK Proof
                </button>
            </div>
            
            <div id="preview-area" class="mt-6"></div>
            
            <button id="postButton" class="mt-8 w-full py-5 bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-bold text-lg rounded-3xl">
                🛡️ Publish Forensic Testimony
            </button>
        </div>

        <!-- Feed -->
        <div id="feedContainer" class="w-full"></div>
    </div>

    <script>
        tailwind.config = { content: ["./**/*.{html,js}"] };
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>

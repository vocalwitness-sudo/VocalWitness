<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>True Witness - VocalWitness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0f1c; color: white; }
        .glass { background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.25); }
    </style>
</head>
<body class="min-h-screen bg-[#0a0f1c]">
    <!-- Legal Banner -->
    <div class="max-w-2xl mx-auto bg-red-950/30 border border-red-500/20 rounded-3xl p-4 text-xs text-center mx-4 mt-4">
        <strong class="text-red-400">Legal:</strong> VocalWitness functions strictly as an un-manipulated decentralized distribution medium.
    </div>

    <!-- Same Layout as index.html -->
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div id="sidebar" class="w-72 bg-zinc-950 border-r border-zinc-800 flex flex-col hidden lg:flex">
            <!-- Sidebar content will be populated by JS -->
            <div class="p-6 border-b border-zinc-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-2xl">🔊</div>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tighter">VocalWitness</h1>
                        <p class="text-xs text-emerald-500">Truth • Evidence • Public Square</p>
                    </div>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <nav id="main-sidebar-nav" class="space-y-1"></nav>
            </div>
            <!-- Footer links -->
            <div class="p-4 border-t border-zinc-800 mt-auto">
                <div class="space-y-1">
                    <a href="/about.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900 rounded-2xl">ℹ️ About Us</a>
                    <a href="/privacy.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900 rounded-2xl">🔒 Privacy</a>
                    <a href="/safety.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900 rounded-2xl">🛡️ Safety</a>
                    <a href="/terms.html" class="flex items-center gap-3 px-4 py-3 text-zinc-400 hover:text-white hover:bg-zinc-900 rounded-2xl">📜 Terms</a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-zinc-950 border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-4">
        <!-- Back Button -->
        <button onclick="goBack()" 
                class="lg:hidden flex items-center gap-2 text-zinc-400 hover:text-white transition-all px-3 py-2 rounded-2xl hover:bg-zinc-900">
            ← Back
        </button>
        
        <button id="mobile-menu-btn" class="lg:hidden text-3xl p-2">☰</button>
        
        <div class="text-2xl font-semibold text-white">🔬 True Witness</div>
        <!-- Change title dynamically per page -->
    </div>

    <div class="flex items-center gap-4">
        <select id="languageSelector" class="bg-zinc-900 border border-zinc-700 text-white px-5 py-2.5 rounded-2xl text-sm"></select>
        <button onclick="window.toggleNotifications()" class="w-10 h-10 flex items-center justify-center text-2xl relative hover:bg-zinc-900 rounded-2xl">🛎️</button>
        <button onclick="window.showProfile()" class="w-11 h-11 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-3xl">👤</button>
    </div>
</header>

            <div class="flex-1 overflow-auto p-6">
                <div class="glass rounded-3xl p-8 text-center">
                    <h2 class="text-3xl font-bold mb-4">True Witness Mode</h2>
                    <p class="text-zinc-400 mb-8">Verified, high-integrity testimonies with forensic proof.</p>
                    <button onclick="window.loadFeed('true-witness')" class="px-8 py-4 bg-emerald-500 text-black font-bold rounded-3xl">
                        Enter True Witness Feed
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Profile Modal (same as index) -->
    <div id="profileModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[70]">
        <!-- Paste your existing profile modal HTML here from index.html -->
    </div>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/profile.js"></script>
    <script src="https://checkout.flutterwave.com/v3.js"></script>
</body>
</html>

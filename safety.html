<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safety Guidelines - VocalWitness</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0f1c] text-white min-h-screen">
  <div class="max-w-3xl mx-auto p-8">
    <h1 class="text-4xl font-bold mb-8">Safety Guidelines</h1>
    
    <div class="prose prose-invert">
      <h2 class="text-2xl font-semibold">Be Truthful</h2>
      <p>Only share what you genuinely believe to be true.</p>

      <h2 class="text-2xl font-semibold mt-8">Protect Privacy</h2>
      <p>Do not share personal information that could harm others.</p>

      <h2 class="text-2xl font-semibold mt-8">No Hate Speech</h2>
      <p>Content that promotes violence or discrimination will be removed.</p>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en-NG">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#10b981">

  <!-- CSP - Must stay inside <head> -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https: wss: blob: data:;
                 script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://www.gstatic.com;
                 style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;
                 connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com wss://*.firebaseio.com;
                 img-src 'self' https: data: blob:;
                 font-src 'self' https: data:;
                 object-src 'none';
                 base-uri 'self';
                 frame-ancestors 'none';">

  <title>VocalWitness • Truth • Evidence • Public Square</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0f1c;
      color: white;
    }
    .glass {
      background: rgba(17, 24, 39, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(16, 185, 129, 0.25);
    }
  </style>
</head>
<body class="min-h-screen pb-20 p-4 bg-[#0a0f1c]">

  <!-- LEGAL NOTICE -->
  <div class="max-w-2xl mx-auto bg-red-950/30 border border-red-500/20 rounded-3xl p-4 text-xs mb-6 text-center">
    <strong class="text-red-400">Legal:</strong> VocalWitness is an un-manipulated decentralized distribution medium.
  </div>

  <div class="max-w-2xl mx-auto">

    <!-- HEADER -->
    <header class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🔊</div>
          <div>
            <h1 class="text-4xl font-bold tracking-tighter text-emerald-400">VocalWitness</h1>
            <p class="text-xs text-emerald-500 -mt-1">Truth • Evidence • Public Square</p>
          </div>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <select id="languageSelector" onchange="changeLanguage(this.value)" class="bg-zinc-900 border border-zinc-700 text-white px-5 py-2.5 rounded-2xl text-sm focus:outline-none focus:border-emerald-500">
          <!-- Options populated by JS -->
        </select>

        <button onclick="showSupportModal()" class="px-6 py-3 bg-gradient-to-r from-emerald-500 to-teal-500 text-black font-semibold rounded-2xl flex items-center gap-2 shadow-xl hover:scale-105 transition-all text-sm">
          💚 Support the Square
        </button>

        <button onclick="showProfile()" class="w-11 h-11 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-3xl transition-all border border-zinc-600 flex items-center justify-center">
          👤
        </button>
      </div>
    </header>

    <!-- NAVIGATION -->
    <nav class="flex items-center justify-between mb-6">
      <div id="main-nav" class="flex gap-2 overflow-x-auto pb-2">
        <button onclick="loadFeed('citizen')" class="nav-btn active px-5 py-2.5 rounded-2xl whitespace-nowrap" data-feed="citizen">Citizen Talk</button>
        <button onclick="navigateToPage('true-witness.html')" class="nav-btn px-5 py-2.5 rounded-2xl whitespace-nowrap">True Witness</button>
        <button onclick="navigateToPage('live-arena.html')" class="nav-btn px-5 py-2.5 rounded-2xl whitespace-nowrap">Live Arena</button>
        <button onclick="navigateToPage('groups.html')" class="nav-btn px-5 py-2.5 rounded-2xl whitespace-nowrap">Groups</button>
      </div>

      <div class="relative">
        <button onclick="toggleMoreMenu()" class="w-10 h-10 flex items-center justify-center text-2xl hover:bg-zinc-800 rounded-2xl transition-all">☰</button>
        <div id="moreMenu" class="hidden absolute right-0 mt-2 w-56 bg-zinc-900 border border-zinc-700 rounded-3xl shadow-2xl py-2 z-50">
          <a href="moderation.html" class="block px-6 py-3 hover:bg-zinc-800">🛡️ Moderation Dashboard</a>
          <a href="forensic-ledger.html" class="block px-6 py-3 hover:bg-zinc-800">📜 Forensic Ledger</a>
          <a href="my-testimonies.html" class="block px-6 py-3 hover:bg-zinc-800">📝 My Testimonies</a>
          <a href="about.html" class="block px-6 py-3 hover:bg-zinc-800">ℹ️ About</a>
          <a href="safety.html" class="block px-6 py-3 hover:bg-zinc-800">🛡️ Safety</a>
          <a href="privacy.html" class="block px-6 py-3 hover:bg-zinc-800">🔒 Privacy</a>
          <a href="terms.html" class="block px-6 py-3 hover:bg-zinc-800">📜 Terms</a>
        </div>
      </div>
    </nav>

    <!-- Rest of your content (composer, feed, etc.) goes here -->

    <!-- FOOTER -->
    <footer class="max-w-2xl mx-auto mt-20 pt-8 border-t border-zinc-800 text-center text-xs text-zinc-500">
      <div class="flex flex-wrap justify-center gap-x-6 gap-y-2 mb-6">
        <a href="about.html" class="hover:text-emerald-400 transition-colors">About</a>
        <a href="safety.html" class="hover:text-emerald-400 transition-colors">Safety</a>
        <a href="privacy.html" class="hover:text-emerald-400 transition-colors">Privacy</a>
        <a href="terms.html" class="hover:text-emerald-400 transition-colors">Terms</a>
      </div>
      <p>© 2026 VocalWitness • Built for Truth &amp; Evidence</p>
    </footer>
  </div>

  <!-- All your modals here (DAO, Vote, Support, Profile, Group, etc.) -->

  <script>
    // Your JS functions here
    function toggleMoreMenu() { document.getElementById('moreMenu').classList.toggle('hidden'); }
    function navigateToPage(page) { window.location.href = page; }
    function showProfile() { document.getElementById('profileModal').classList.remove('hidden'); }
    function closeProfile() { document.getElementById('profileModal').classList.add('hidden'); }
    function showSupportModal() { document.getElementById('supportModal').classList.remove('hidden'); }
    // ... add the rest of your functions
  </script>

  <script type="module" src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    
    <!-- CSP Fix -->
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self';
                   script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://www.gstatic.com https://checkout.flutterwave.com;
                   style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com;
                   font-src 'self' https://fonts.gstatic.com;">

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/logo.png" type="image/png">
    <title>Forensic Ledger • VocalWitness</title>
   
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
   
    <style>
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: #0a0f1c; 
            color: white; 
        }
        .glass { 
            background: rgba(17, 24, 39, 0.95); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(16, 185, 129, 0.25); 
        }
    </style>
</head>
<body class="min-h-screen pb-20 p-4 bg-[#0a0f1c]">

    <!-- LEGAL NOTICE -->
    <div class="max-w-2xl mx-auto bg-red-950/30 border border-red-500/20 rounded-3xl p-4 text-xs mb-6 text-center">
        <strong class="text-red-400">Legal:</strong> VocalWitness is an un-manipulated decentralized distribution medium.
    </div>

    <div class="max-w-2xl mx-auto">
        
        <!-- HEADER -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <button onclick="window.goBack()" 
                        class="px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center gap-2 text-sm">
                    ← Back
                </button>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-2xl">📜</div>
                    <div>
                        <h1 class="text-3xl font-bold tracking-tighter text-emerald-400">Forensic Ledger</h1>
                        <p class="text-xs text-emerald-500">Immutable • Transparent • Verifiable</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="glass rounded-3xl p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Recent Verified Testimonies</h2>
            <!-- Content will be populated by JS -->
            <div id="ledgerContainer" class="space-y-4">
                <!-- Dynamic content loaded here -->
            </div>
        </div>

        <div class="text-center text-xs text-zinc-500 mt-8">
            All entries are cryptographically signed and timestamped on-chain.
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="max-w-2xl mx-auto mt-20 pt-8 border-t border-zinc-800 text-center text-xs text-zinc-500">
        <p>© 2026 VocalWitness • Forensic Ledger</p>
    </footer>

    <!-- Scripts -->
    <script src="../js/utils.js"></script>
    <script>
        // Make goBack globally available
        window.goBack = window.goBack || function() {
            if (window.history.length > 1) window.history.back();
            else window.location.href = 'index.html';
        };
    </script>
    <script type="module" src="../js/main.js"></script>

    <script>
        // Page-specific initialization
        document.addEventListener('DOMContentLoaded', () => {
            console.log("Forensic Ledger loaded");
            // TODO: Load ledger data from Firestore
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups - VocalWitness</title>
    <link rel="stylesheet" href="style.css">
    <meta property="og:title" content="Groups - VocalWitness">
    <meta property="og:description" content="Join or create vocal witness groups">
    <meta property="og:image" content="https://vocalwitness-3affa.web.app/logo.png">
    <meta property="og:url" content="https://vocalwitness-3affa.web.app/groups.html">
    <link rel="icon" href="logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0a0f1c] text-white p-4 pb-20">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold text-emerald-400">Groups</h1>
            <button onclick="window.history.back()" 
                    class="px-5 py-2 text-sm border border-zinc-600 hover:border-zinc-400 rounded-2xl">
                ← Back
            </button>
        </header>

        <!-- Tabs -->
        <div class="flex gap-2 mb-6 border-b border-zinc-700 pb-2">
            <button onclick="switchTab(0)" class="tab-btn active px-6 py-3 rounded-2xl font-medium" id="tab-discover">Discover</button>
            <button onclick="switchTab(1)" class="tab-btn px-6 py-3 rounded-2xl font-medium" id="tab-my">My Groups</button>
        </div>

        <!-- Search -->
        <input type="text" id="searchInput" 
               class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 mb-6 text-white placeholder-zinc-500 focus:outline-none focus:border-emerald-500"
               placeholder="Search groups..." onkeyup="filterGroups()">

        <div id="status" class="my-6 min-h-[60px]"></div>
        <div id="group-container" class="space-y-6"></div>

        <!-- Create Button -->
        <button onclick="showCreateModal()" 
                class="mt-12 w-full max-w-md mx-auto block bg-gradient-to-r from-emerald-500 to-teal-500 text-black font-semibold py-5 rounded-3xl text-lg shadow-xl active:scale-95 transition-all">
            ➕ Create New Group
        </button>
    </div>

    <!-- Create Group Modal -->
    <div id="createModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        <div class="glass rounded-3xl p-8 max-w-md w-full mx-4">
            <h2 class="text-2xl font-bold mb-6">Create New Group</h2>
            
            <input type="text" id="groupName" placeholder="Group Name" 
                   class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 mb-4 focus:outline-none focus:border-emerald-500">
            
            <textarea id="groupDesc" placeholder="Description (optional)" 
                      class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 h-28 mb-6 focus:outline-none focus:border-emerald-500"></textarea>
            
            <label class="block text-sm mb-2 text-zinc-400">Group Type</label>
            <select id="groupType" 
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 mb-8 focus:outline-none focus:border-emerald-500">
                <option value="citizen_circle">🛡️ Citizen Circle (Phone Verified)</option>
                <option value="witness_circle">🔬 Witness Circle (ZK Verified)</option>
            </select>

            <div class="flex gap-4">
                <button onclick="createGroupFromModal()" 
                        class="flex-1 py-4 bg-emerald-500 hover:bg-emerald-600 text-black font-bold rounded-2xl">Create Group</button>
                <button onclick="hideCreateModal()" 
                        class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Manage Group Modal -->
    <div id="manageModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        <div class="glass rounded-3xl p-8 max-w-lg w-full mx-4 max-h-[85vh] overflow-y-auto">
            <h2 id="manageTitle" class="text-2xl font-bold mb-6"></h2>
            <div id="membersList" class="space-y-4"></div>
            <button onclick="hideManageModal()" 
                    class="mt-8 w-full py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-medium">Close</button>
        </div>
    </div>

    <script type="module">
        console.log("✅ Groups Page - Full Upgraded Version Loaded");

        import { db, auth } from './js/firebase-config.js';
        import { 
            doc, updateDoc, arrayUnion, arrayRemove, getDoc, increment,
            collection, query, orderBy, addDoc, onSnapshot 
        } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
        
        import { showToast } from './js/utils.js';
        import { getCurrentUserTier, TIERS } from './js/tier.js';
        import { canAccess } from './js/rbac.js';

        let unsubscribe = null;
        let allGroups = [];
        let currentTab = 0; // 0 = Discover, 1 = My Groups

        const groupContainer = document.getElementById('group-container');
        const statusEl = document.getElementById('status');

        // Real-time listener
        function startRealTimeListener() {
            if (unsubscribe) unsubscribe();
            const q = query(collection(db, "groups"), orderBy("memberCount", "desc"));
            unsubscribe = onSnapshot(q, (snapshot) => {
                allGroups = snapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));
                renderGroups();
            }, (error) => {
                console.error("Groups listener error:", error);
                showToast("Error loading groups", "error");
            });
        }

        function renderGroups(filtered = null) {
            groupContainer.innerHTML = "";
            const groupsToShow = filtered || allGroups;

            if (groupsToShow.length === 0) {
                statusEl.innerHTML = `<p class="text-center py-12 text-zinc-400 text-lg">No groups found.</p>`;
                return;
            }
            statusEl.style.display = "none";

            groupsToShow.forEach(group => {
                const isMember = group.members && group.members.includes(auth.currentUser?.uid);
                const isAdmin = group.createdBy === auth.currentUser?.uid;

                if (currentTab === 1 && !isMember) return;
                if (currentTab === 0 && !isMember && allGroups.length > 8) return; // subtle discover filter

                const div = document.createElement('div');
                div.className = "group-card glass rounded-3xl p-6 border border-transparent hover:border-emerald-500/30 transition-all";
                div.innerHTML = `
                    <div class="flex justify-between">
                        <div class="flex-1">
                            <h3 class="font-semibold text-xl">${group.name}</h3>
                            <p class="text-zinc-400 mt-1 text-sm line-clamp-2">${group.description || "No description provided"}</p>
                            <div class="mt-3">
                                <span class="inline-flex items-center gap-1.5 text-xs px-4 py-1.5 rounded-full ${group.type === 'witness_circle' ? 'bg-amber-500/10 text-amber-400' : 'bg-emerald-500/10 text-emerald-400'}">
                                    ${group.type === 'witness_circle' ? '🔬 Witness Circle' : '🛡️ Citizen Circle'}
                                </span>
                            </div>
                        </div>
                        <div class="text-right text-sm text-zinc-400">
                            <div>${group.memberCount || 0}</div>
                            <div class="text-xs">members</div>
                        </div>
                    </div>

                    <div class="flex gap-3 mt-6">
                        ${isMember ? 
                            `<button onclick="leaveGroup('${group.id}')" class="flex-1 py-3.5 bg-red-600/80 hover:bg-red-600 rounded-2xl text-sm font-medium">Leave Group</button>` :
                            `<button onclick="joinGroup('${group.id}')" class="flex-1 py-3.5 bg-emerald-500 hover:bg-emerald-600 text-black rounded-2xl text-sm font-medium">Join Group</button>`
                        }
                        <button onclick="copyInviteLink('${group.id}')" class="px-7 py-3.5 bg-zinc-700 hover:bg-zinc-600 rounded-2xl text-sm">Invite</button>
                        ${isAdmin ? `<button onclick="showManageModal('${group.id}')" class="px-7 py-3.5 bg-zinc-700 hover:bg-zinc-600 rounded-2xl text-sm">Manage</button>` : ''}
                    </div>

                    ${isMember ? `
                    <button onclick="openGroupFeed('${group.id}')" 
                            class="mt-5 w-full py-3 border border-zinc-600 hover:border-emerald-500 rounded-2xl text-sm font-medium">
                        📢 View Group Activity Feed
                    </button>` : ''}
                `;
                groupContainer.appendChild(div);
            });
        }

        // Join Group with permission check
        async function joinGroup(groupId) {
            if (!auth.currentUser) return showToast("Please sign in first", "error");
            try {
                const groupRef = doc(db, "groups", groupId);
                const snap = await getDoc(groupRef);
                if (!snap.exists()) return showToast("Group not found", "error");

                const group = snap.data();
                const userTier = await getCurrentUserTier();

                if (group.type === 'witness_circle' && userTier !== TIERS.WITNESS_CIRCLE) {
                    return showToast("Witness Circle requires ZK verification", "error");
                }

                await updateDoc(groupRef, {
                    members: arrayUnion(auth.currentUser.uid),
                    memberCount: increment(1)
                });
                showToast("✅ You joined the group!", "success");
            } catch (err) {
                console.error(err);
                showToast("Failed to join group", "error");
            }
        }

        // Leave Group
        async function leaveGroup(groupId) {
            if (!auth.currentUser) return;
            if (!confirm("Are you sure you want to leave this group?")) return;

            try {
                const groupRef = doc(db, "groups", groupId);
                await updateDoc(groupRef, {
                    members: arrayRemove(auth.currentUser.uid),
                    memberCount: increment(-1)
                });
                showToast("You left the group", "success");
            } catch (err) {
                showToast("Failed to leave group", "error");
            }
        }

        function copyInviteLink(groupId) {
            const url = `${window.location.origin}/groups.html?join=${groupId}`;
            navigator.clipboard.writeText(url).then(() => {
                showToast("Invite link copied to clipboard!", "success");
            });
        }

        // Create Group
        async function createGroupFromModal() {
            const name = document.getElementById('groupName').value.trim();
            const desc = document.getElementById('groupDesc').value.trim();
            const type = document.getElementById('groupType').value;

            if (!name) return showToast("Group name is required", "error");

            const userTier = await getCurrentUserTier();
            if (type === 'witness_circle' && userTier !== TIERS.WITNESS_CIRCLE) {
                return showToast("Only Witness Circle members can create this type of group", "error");
            }

            try {
                await addDoc(collection(db, "groups"), {
                    name,
                    description: desc,
                    type,
                    createdBy: auth.currentUser.uid,
                    members: [auth.currentUser.uid],
                    memberCount: 1,
                    createdAt: new Date()
                });
                showToast("🎉 Group created successfully!", "success");
                hideCreateModal();
            } catch (err) {
                console.error(err);
                showToast("Failed to create group", "error");
            }
        }

        // Modals
        function showCreateModal() {
            if (!auth.currentUser) return showToast("Sign in to create a group", "error");
            document.getElementById('createModal').classList.remove('hidden');
        }
        function hideCreateModal() {
            document.getElementById('createModal').classList.add('hidden');
        }

        async function showManageModal(groupId) {
            // ... (keep your existing logic or expand later)
            const group = allGroups.find(g => g.id === groupId);
            if (!group) return;
            document.getElementById('manageTitle').textContent = `Manage: ${group.name}`;
            // Populate members...
            document.getElementById('manageModal').classList.remove('hidden');
        }
        function hideManageModal() {
            document.getElementById('manageModal').classList.add('hidden');
        }

        // Tabs & Search
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === tab));
            renderGroups();
        }

        function filterGroups() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = term ? allGroups.filter(g => 
                g.name.toLowerCase().includes(term) || 
                (g.description || '').toLowerCase().includes(term)
            ) : null;
            renderGroups(filtered);
        }

        // Group-specific Activity Feed (placeholder - ready for expansion)
        window.openGroupFeed = function(groupId) {
            showToast(`Opening activity feed for group ${groupId}...`, "info");
            // Future: Open modal or navigate with group filter
        };

        // Init
        function init() {
            if (auth.currentUser) {
                startRealTimeListener();
            } else {
                statusEl.innerHTML = `<p class="text-center text-amber-400 py-8">Please sign in to view and join groups.</p>`;
            }

            // Handle invite link ?join=xxx
            const params = new URLSearchParams(window.location.search);
            const joinId = params.get('join');
            if (joinId) setTimeout(() => joinGroup(joinId), 1000);
        }

        // Global functions for onclick handlers
        window.switchTab = switchTab;
        window.filterGroups = filterGroups;
        window.showCreateModal = showCreateModal;
        window.hideCreateModal = hideCreateModal;
        window.createGroupFromModal = createGroupFromModal;
        window.joinGroup = joinGroup;
        window.leaveGroup = leaveGroup;
        window.copyInviteLink = copyInviteLink;
        window.showManageModal = showManageModal;
        window.hideManageModal = hideManageModal;
        window.openGroupFeed = openGroupFeed;

        document.addEventListener('DOMContentLoaded', init);
        window.addEventListener('beforeunload', () => { if (unsubscribe) unsubscribe(); });
    </script>
</body>
</html>

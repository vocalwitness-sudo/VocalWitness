<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups - VocalWitness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.25); }
        .tab-btn.active { background: #10b981; color: #000; }
    </style>
</head>
<body class="min-h-screen bg-[#0a0f1c] text-white p-4">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold text-emerald-400">Groups</h1>
            <button onclick="window.history.back()" class="px-5 py-2 text-sm border border-zinc-600 rounded-2xl">← Back</button>
        </header>

        <div class="flex gap-2 mb-6 border-b border-zinc-700 pb-2">
            <button onclick="window.switchTab(0)" class="tab-btn active px-6 py-3 rounded-2xl font-medium" id="tab-discover">Discover</button>
            <button onclick="window.switchTab(1)" class="tab-btn px-6 py-3 rounded-2xl font-medium" id="tab-my">My Groups</button>
        </div>

        <input type="text" id="searchInput" onkeyup="window.filterGroups()"
               class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 mb-6"
               placeholder="Search groups...">

        <div id="group-container" class="space-y-6"></div>

        <button onclick="window.showCreateModal()" class="mt-12 w-full max-w-md mx-auto block bg-emerald-500 text-black font-semibold py-5 rounded-3xl">
            ➕ Create New Group
        </button>
    </div>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/group.js"></script>
</body>
</html>

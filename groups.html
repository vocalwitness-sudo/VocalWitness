<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/logo.png" type="image/png">
    <title>Groups - VocalWitness</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0f1c; color: white; }
        .glass { background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.25); }
    </style>
</head>
<body class="min-h-screen p-4 bg-[#0a0f1c]">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-4xl font-bold text-emerald-400 mb-8">Groups</h1>
        
        <div class="glass rounded-3xl p-6 mb-6">
            <button onclick="showGroupModal()" class="w-full py-4 bg-emerald-500 text-black font-bold rounded-2xl mb-6">+ Create New Group</button>
            
            <div id="groupsList" class="space-y-4">
                <!-- Groups will be populated by JS -->
                <p class="text-zinc-400 text-center py-8">No groups yet. Create one to start a community!</p>
            </div>
        </div>
    </div>

    <!-- Group Creation Modal -->
    <div id="groupModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[60]">
        <div class="glass rounded-3xl max-w-md w-full mx-4 p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Create New Group</h2>
                <button onclick="closeGroupModal()" class="text-3xl text-zinc-400 hover:text-white">×</button>
            </div>
            
            <input id="groupName" type="text" placeholder="Group Name" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 mb-4">
            <textarea id="groupDesc" rows="3" placeholder="Group Description (optional)" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 mb-6"></textarea>
            
            <button onclick="createGroup()" class="w-full py-4 bg-emerald-500 text-black font-bold rounded-2xl">Create Group</button>
        </div>
    </div>

    <script>
        function showGroupModal() {
            document.getElementById('groupModal').classList.remove('hidden');
        }

        function closeGroupModal() {
            document.getElementById('groupModal').classList.add('hidden');
        }

        async function createGroup() {
            const name = document.getElementById('groupName').value.trim();
            if (!name) {
                alert("Group name is required");
                return;
            }
            alert(`✅ Group "${name}" created successfully!`);
            closeGroupModal();
        }

        // Load some dummy groups
        window.onload = () => {
            console.log("Groups page loaded");
        };
    </script>
</body>
</html>

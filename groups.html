<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groups - VocalWitness</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="logo.png" type="image/png">
  
  <!-- Social Sharing Meta Tags -->
  <meta property="og:title" content="Groups - VocalWitness">
  <meta property="og:description" content="Join or create groups on VocalWitness">
  <meta property="og:image" content="https://vocalwitness-3affa.web.app/logo.png">
  <meta property="og:url" content="https://vocalwitness-3affa.web.app/groups.html">
  <meta property="og:type" content="website">
</head>
<body>
  <h1>Groups</h1>
  <p id="status">Loading groups...</p>
  
  <div id="group-container"></div>

  <script type="module">
    console.log("✅ Groups module loaded inline");

    import { db, auth } from './js/firebase-config.js';
    import { doc, updateDoc, arrayUnion, arrayRemove, getDoc, increment, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { showToast } from './js/utils.js';

    const groupContainer = document.getElementById('group-container');
    const statusEl = document.getElementById('status');

    // Fetch and display groups
    async function loadGroups() {
      try {
        const q = query(collection(db, "groups"), orderBy("memberCount", "desc"));
        const snapshot = await getDocs(q);
        
        groupContainer.innerHTML = "";

        if (snapshot.empty) {
          statusEl.textContent = "No groups found.";
          return;
        }

        statusEl.style.display = "none";

        snapshot.forEach((docSnap) => {
          const group = docSnap.data();
          const groupId = docSnap.id;
          const isMember = group.members && group.members.includes(auth.currentUser?.uid);
          
          const div = document.createElement('div');
          div.className = "group-card";
          div.innerHTML = `
            <h3>${group.name || 'Unnamed Group'}</h3>
            <p>Members: ${group.memberCount || 0}</p>
            ${isMember ? 
              `<button onclick="leaveGroup('${groupId}')">Leave Group</button>` : 
              `<button onclick="joinGroup('${groupId}')">Join Group</button>`
            }
            ${group.createdBy === auth.currentUser?.uid ? 
              `<button onclick="removeMember('${groupId}', 'some-user-id')">Manage Members</button>` : ''}
          `;
          groupContainer.appendChild(div);
        });
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Failed to load groups.";
      }
    }

    // Your existing functions
    async function joinGroup(groupId) {
      if (!auth.currentUser) {
        showToast("Sign in to join group", "error");
        return;
      }
      try {
        const groupRef = doc(db, "groups", groupId);
        const groupSnap = await getDoc(groupRef);
        const group = groupSnap.data();

        if (group.members && group.members.includes(auth.currentUser.uid)) {
          showToast("You are already a member", "info");
          return;
        }

        await updateDoc(groupRef, {
          members: arrayUnion(auth.currentUser.uid),
          memberCount: increment(1)
        });
        showToast("✅ Joined the group successfully!", "success");
        loadGroups(); // Refresh list
      } catch (err) {
        console.error(err);
        showToast("Failed to join group", "error");
      }
    }

    async function leaveGroup(groupId) {
      if (!auth.currentUser) return;
      if (!confirm("Leave this group?")) return;
      try {
        const groupRef = doc(db, "groups", groupId);
        await updateDoc(groupRef, {
          members: arrayRemove(auth.currentUser.uid),
          memberCount: increment(-1)
        });
        showToast("You have left the group", "success");
        loadGroups();
      } catch (err) {
        showToast("Failed to leave group", "error");
      }
    }

    async function isGroupAdmin(groupId) {
      if (!auth.currentUser) return false;
      try {
        const groupSnap = await getDoc(doc(db, "groups", groupId));
        const group = groupSnap.data();
        return group.createdBy === auth.currentUser.uid;
      } catch (e) {
        return false;
      }
    }

    async function removeMember(groupId, memberId) {
      if (!await isGroupAdmin(groupId)) {
        showToast("Only group admins can remove members", "error");
        return;
      }
      if (!confirm("Remove this member from the group?")) return;
      try {
        const groupRef = doc(db, "groups", groupId);
        await updateDoc(groupRef, {
          members: arrayRemove(memberId),
          memberCount: increment(-1)
        });
        showToast("Member removed successfully", "success");
        loadGroups();
      } catch (err) {
        showToast("Failed to remove member", "error");
      }
    }

    // Make functions global
    window.joinGroup = joinGroup;
    window.leaveGroup = leaveGroup;
    window.removeMember = removeMember;
    window.isGroupAdmin = isGroupAdmin;

    // Load groups when page loads
    loadGroups();
  </script>
</body>
</html>

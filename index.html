<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocalWitness • Premium Forensic Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0f1c; color: white; }
        .glass { background: rgba(17, 24, 39, 0.92); backdrop-filter: blur(16px); border: 1px solid rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="min-h-screen pb-28 p-4">

    <div class="max-w-2xl mx-auto">
        <header class="flex items-center justify-between mb-6">
            <h1 class="text-3xl font-bold text-emerald-400">VocalWitness</h1>
        </header>

        <div class="bg-[#111827] rounded-3xl p-6 mb-10 glass" id="composer">
            <textarea id="mainInput" rows="4" class="w-full bg-[#1e293b] text-white border border-zinc-800 rounded-2xl p-5 focus:ring-2 focus:ring-emerald-500 resize-none text-sm" placeholder="Provide raw description..."></textarea>
            <button id="postButton" class="mt-6 w-full bg-emerald-500 hover:bg-emerald-600 text-black py-4 rounded-2xl font-bold text-base shadow-lg transition-all">Publish to Decentralized Ledger</button>
        </div>

        <div id="feedContainer" class="space-y-4">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyATxYekXgjdLP2SfR42FG8rEdajq_pIEb0",
            authDomain: "vocalwitness-3affa.firebaseapp.com",
            projectId: "vocalwitness-3affa",
            storageBucket: "vocalwitness-3affa.firebasestorage.app",
            messagingSenderId: "108466981866",
            appId: "1:108466981866:web:b53360ad44012a576c8093",
            measurementId: "G-LQ2JRWD06W"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Logic ---
        const postButton = document.getElementById('postButton');
        const mainInput = document.getElementById('mainInput');
        const feedContainer = document.getElementById('feedContainer');

        // Save Data
        postButton.addEventListener('click', async () => {
            const text = mainInput.value.trim();
            if (!text) return;

            try {
                await addDoc(collection(db, "witness_posts"), {
                    text: text,
                    timestamp: new Date()
                });
                mainInput.value = "";
                alert("Post Published!");
            } catch (e) {
                console.error("Error: ", e);
            }
        });

        // Listen for Data
        const q = query(collection(db, "witness_posts"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            feedContainer.innerHTML = ""; // Clear feed
            snapshot.forEach((doc) => {
                const post = doc.data();
                const div = document.createElement('div');
                div.className = "p-4 bg-zinc-800 rounded-xl text-zinc-200 text-sm";
                div.innerText = post.text;
                feedContainer.appendChild(div);
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocalWitness - Truth • Evidence • Public Square</title>
    <meta name="theme-color" content="#10b981">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .glass {
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(148, 163, 184, 0.12);
        }
        
        .nav-tab {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .nav-tab.active {
            background-color: #10b981;
            color: black;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgb(16 185 129 / 0.3);
        }
        
        .post-card {
            transition: all 0.2s ease;
        }
        
        .post-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        .glass-modal {
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen bg-[#0a0f1c] text-slate-200 pb-24">

<!-- HEADER -->
<header class="sticky top-0 z-50 glass rounded-3xl mx-4 mt-4 p-4">
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg">🔊</div>
            <div>
                <h1 class="text-3xl font-bold tracking-tighter">VocalWitness</h1>
                <p class="text-xs text-emerald-400 tracking-[2px] -mt-1">TRUTH • EVIDENCE • PUBLIC SQUARE</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <select id="languageSelector" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-2 text-sm focus:outline-none focus:border-emerald-500">
                <option value="en">🇬🇧 English</option>
                <option value="es">🇪🇸 Español</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="de">🇩🇪 Deutsch</option>
            </select>

            <a href="#" class="flex items-center gap-2 text-emerald-400 hover:text-emerald-300 px-4 py-2 rounded-2xl hover:bg-zinc-800 transition-colors">
                <span>🔒</span> Privacy First
            </a>

            <button onclick="showSupportModal()" class="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-black font-semibold rounded-2xl transition-all">
                Support the Square
            </button>

            <button onclick="showProfileModal()" id="profileBtn"
                class="w-9 h-9 bg-zinc-700 hover:bg-zinc-600 rounded-2xl flex items-center justify-center text-xl transition-all">
                👤
            </button>

            <button onclick="showAuthModal()" id="authBtn"
                class="px-6 py-2.5 bg-white text-black font-semibold rounded-2xl hover:bg-emerald-100 transition-all">
                Sign In
            </button>
        </div>
    </div>
</header>

<!-- NAVIGATION -->
<nav class="flex gap-2 mt-6 px-4 overflow-x-auto pb-4" id="main-nav">
    <button data-tab="square" onclick="switchTab(this)" class="nav-tab active px-6 py-3 rounded-3xl whitespace-nowrap flex flex-col items-center min-w-fit">
        <span class="font-semibold">Public Square</span>
        <span class="text-xs text-zinc-400">Testimonies</span>
    </button>
    <button data-tab="ledger" onclick="switchTab(this)" class="nav-tab px-6 py-3 rounded-3xl whitespace-nowrap flex flex-col items-center min-w-fit">
        <span class="font-semibold">Evidence Ledger</span>
        <span class="text-xs text-zinc-400">Records</span>
    </button>
    <button data-tab="arena" onclick="switchTab(this)" class="nav-tab px-6 py-3 rounded-3xl whitespace-nowrap flex flex-col items-center min-w-fit">
        <span class="font-semibold">Live Arena</span>
        <span class="text-xs text-zinc-400">Discussions</span>
    </button>
    <button data-tab="mycircle" onclick="switchTab(this)" class="nav-tab px-6 py-3 rounded-3xl whitespace-nowrap flex flex-col items-center min-w-fit">
        <span class="font-semibold">My Circle</span>
        <span class="text-xs text-zinc-400">Network</span>
    </button>
    <button data-tab="witness" onclick="switchTab(this)" class="nav-tab px-6 py-3 rounded-3xl whitespace-nowrap flex flex-col items-center min-w-fit bg-amber-900/70 text-amber-300 border border-amber-700">
        <span class="font-semibold">Verified Witnesses</span>
        <span class="text-xs text-amber-200">Elite Circle</span>
    </button>
</nav>

<!-- CREATE POST -->
<div class="glass rounded-3xl p-6 mx-4 mb-8">
    <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
        <span>📝</span> Share Your Testimony
    </h2>
    
    <textarea id="postInput" rows="4" 
        class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-5 text-base placeholder-zinc-500 focus:outline-none focus:border-emerald-500 resize-none"
        placeholder="What did you witness? Be clear, honest, and detailed..."></textarea>

    <div class="flex gap-3 mt-4">
        <button onclick="triggerPhotoUpload()" 
            class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 rounded-2xl flex items-center justify-center gap-2 font-medium transition-all">
            📸 Photo / Video Evidence
        </button>
        <button onclick="triggerVoiceRecord()" 
            class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 rounded-2xl flex items-center justify-center gap-2 font-medium transition-all">
            🎤 Voice Testimony
        </button>
    </div>

    <div id="previewArea" class="hidden mt-6 border border-dashed border-zinc-600 rounded-2xl p-4 text-center text-zinc-400"></div>

    <button onclick="publishPost()" 
        class="mt-6 w-full py-5 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-black font-bold text-lg rounded-3xl transition-all active:scale-95 shadow-xl shadow-emerald-500/30">
        🚀 Publish to the Public Square
    </button>
</div>

<!-- MAIN CONTENT -->
<main id="mainContent" class="px-4 space-y-6">
    <!-- Populated by JS -->
</main>

<!-- MODALS -->
<!-- Support Modal -->
<div id="supportModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
    <div class="glass rounded-3xl max-w-md w-full p-8 glass-modal">
        <div class="text-center">
            <div class="text-6xl mb-6">🌱</div>
            <h2 class="text-3xl font-bold text-emerald-400 mb-2">Support the Square</h2>
            <p class="text-zinc-400 mb-8">Help keep truth and evidence free and uncensored.</p>
            
            <div class="bg-zinc-950 p-6 rounded-2xl border border-zinc-700">
                <p class="text-xs text-zinc-500 mb-4">USDT (TRC20)</p>
                <img src="https://via.placeholder.com/200x200/10b981/ffffff?text=QR" alt="QR" class="mx-auto rounded-2xl mb-4">
                <code class="block bg-black p-3 rounded-xl text-emerald-300 text-sm break-all" id="walletAddr">
                    TDtka2ZxJHtnWc3sRygm7WWfJVZHbhkLtK
                </code>
                <button onclick="copyWallet()" 
                    class="mt-4 w-full py-3 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 rounded-2xl">📋 Copy Address</button>
            </div>
            
            <button onclick="hideSupportModal()" 
                class="mt-6 w-full py-3 text-zinc-400 hover:text-white">Close</button>
        </div>
    </div>
</div>

<!-- Auth Modal -->
<div id="authModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
    <div class="glass rounded-3xl max-w-md w-full p-8 glass-modal" id="authModalContent">
        <!-- Filled by JS -->
    </div>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
    <div class="glass rounded-3xl max-w-lg w-full p-8 glass-modal">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">My Profile</h2>
            <button onclick="hideProfileModal()" class="text-4xl leading-none text-zinc-400 hover:text-white">×</button>
        </div>
        <div id="profileContent" class="space-y-6">
            <!-- JS filled -->
        </div>
    </div>
</div>

<script>
// Mock Data
let posts = [
    {
        id: 1,
        author: "Elena Voss",
        avatar: "🕵️",
        time: "2h ago",
        content: "I witnessed clear election irregularities in precinct 47. I have timestamped photos and two other witnesses ready to corroborate.",
        media: "📸",
        likes: 124,
        comments: 28,
        verified: true
    },
    {
        id: 2,
        author: "Marcus Hale",
        avatar: "🛡️",
        time: "5h ago",
        content: "Local officials trying to silence parents at school board meeting. Full audio recording attached.",
        media: "🎤",
        likes: 87,
        comments: 19,
        verified: false
    }
];

let currentUser = {
    name: "Alex Rivera",
    username: "@truthseeker_47",
    avatar: "🧿",
    bio: "Documenting truth in the age of narrative."
};

// Render Posts
function renderPosts() {
    const container = document.getElementById('mainContent');
    container.innerHTML = `<h2 class="text-xl font-semibold mb-4 px-1">Latest Testimonies</h2>`;
    
    posts.forEach(post => {
        const postHTML = `
        <div class="post-card glass rounded-3xl p-6">
            <div class="flex items-start gap-4">
                <div class="w-10 h-10 bg-zinc-700 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0">${post.avatar}</div>
                <div class="flex-1">
                    <div class="flex items-center justify-between">
                        <div>
                            <span class="font-semibold">${post.author}</span>
                            ${post.verified ? '<span class="text-emerald-400 text-xs ml-1">✓ Verified Witness</span>' : ''}
                            <p class="text-xs text-zinc-500">${post.time}</p>
                        </div>
                    </div>
                    <p class="mt-3 leading-relaxed">${post.content}</p>
                    ${post.media ? `<div class="mt-4 bg-zinc-900 rounded-2xl h-48 flex items-center justify-center text-6xl">${post.media}</div>` : ''}
                    
                    <div class="flex justify-between items-center mt-6 text-sm">
                        <div class="flex gap-6">
                            <button onclick="likePost(${post.id})" class="flex items-center gap-1 hover:text-emerald-400 transition-colors">
                                ❤️ <span>${post.likes}</span>
                            </button>
                            <button class="flex items-center gap-1 hover:text-emerald-400 transition-colors">
                                💬 <span>${post.comments}</span>
                            </button>
                        </div>
                        <button onclick="reportPost(${post.id})" class="text-amber-400 hover:text-amber-300 text-sm">⚠️ Report</button>
                    </div>
                </div>
            </div>
        </div>`;
        container.innerHTML += postHTML;
    });
}

// Publish New Post
function publishPost() {
    const input = document.getElementById('postInput');
    if (!input.value.trim()) {
        alert("Please write your testimony.");
        return;
    }
    
    const newPost = {
        id: Date.now(),
        author: currentUser.name,
        avatar: currentUser.avatar,
        time: "Just now",
        content: input.value,
        media: "📸",
        likes: 0,
        comments: 0,
        verified: true
    };
    
    posts.unshift(newPost);
    input.value = '';
    renderPosts();
    
    // Fake success animation
    const btn = document.querySelector('button[onclick="publishPost()"]');
    btn.innerHTML = '✅ Published!';
    setTimeout(() => {
        btn.innerHTML = '🚀 Publish to the Public Square';
    }, 2000);
}

// Tab Switching
function switchTab(el) {
    document.querySelectorAll('#main-nav button').forEach(btn => btn.classList.remove('active'));
    el.classList.add('active');
    
    // Simulate different content per tab
    if (el.dataset.tab === 'ledger') {
        document.getElementById('mainContent').innerHTML = `
            <div class="glass rounded-3xl p-8 text-center">
                <h2 class="text-2xl font-bold mb-4">Evidence Ledger</h2>
                <p class="text-zinc-400">Permanent, timestamped, and immutable records coming soon.</p>
                <button onclick="exportToPDF()" class="mt-6 px-8 py-3 bg-emerald-600 rounded-2xl">Export Sample Ledger (PDF)</button>
            </div>`;
    } else {
        renderPosts();
    }
}

// Dummy PDF Export
function exportToPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("VocalWitness Evidence Ledger", 20, 20);
    doc.text("Sample Record - July 2026", 20, 40);
    doc.save("vocalwitness-ledger.pdf");
}

// Modals
function showSupportModal() {
    document.getElementById('supportModal').classList.remove('hidden');
}

function hideSupportModal() {
    document.getElementById('supportModal').classList.add('hidden');
}

function copyWallet() {
    navigator.clipboard.writeText("TDtka2ZxJHtnWc3sRygm7WWfJVZHbhkLtK");
    alert("✅ Wallet address copied!");
}

// Auth Modal
let isLogin = true;

function showAuthModal() {
    const modal = document.getElementById('authModal');
    modal.classList.remove('hidden');
    renderAuthContent();
}

function hideAuthModal() {
    document.getElementById('authModal').classList.add('hidden');
}

function renderAuthContent() {
    const content = document.getElementById('authModalContent');
    content.innerHTML = `
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-emerald-400">${isLogin ? 'Sign In' : 'Create Account'}</h2>
            <button onclick="hideAuthModal()" class="text-4xl text-zinc-400 hover:text-white">×</button>
        </div>
        
        <button onclick="googleLogin()" class="w-full py-4 bg-white text-black rounded-2xl font-medium flex items-center justify-center gap-3 mb-6">
            🌐 Continue with Google
        </button>
        
        <div class="text-center text-zinc-500 my-4">or</div>
        
        <input type="email" placeholder="Email" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 mb-3">
        <input type="password" placeholder="Password" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 mb-6">
        
        <button onclick="${isLogin ? 'loginSuccess()' : 'signupSuccess()'}" 
            class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-black font-semibold rounded-2xl">
            ${isLogin ? 'Sign In' : 'Create Account'}
        </button>
        
        <p onclick="toggleAuthMode()" class="text-center mt-6 text-emerald-400 cursor-pointer hover:underline">
            ${isLogin ? "Don't have an account? Sign Up" : "Already have an account? Sign In"}
        </p>
    `;
}

function toggleAuthMode() {
    isLogin = !isLogin;
    renderAuthContent();
}

function googleLogin() {
    alert("🔑 Google Sign-In simulated (Developer Mode)");
    loginSuccess();
}

function loginSuccess() {
    hideAuthModal();
    document.getElementById('authBtn').innerHTML = '👤 ' + currentUser.name;
    alert("✅ Welcome back to the Square!");
}

function signupSuccess() {
    hideAuthModal();
    alert("🎉 Account created! Welcome to VocalWitness.");
}

// Profile
function showProfileModal() {
    const modal = document.getElementById('profileModal');
    modal.classList.remove('hidden');
    
    document.getElementById('profileContent').innerHTML = `
        <div class="flex flex-col items-center">
            <div class="w-24 h-24 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-3xl flex items-center justify-center text-6xl mb-4">${currentUser.avatar}</div>
            <h3 class="text-2xl font-bold">${currentUser.name}</h3>
            <p class="text-emerald-400">${currentUser.username}</p>
            <p class="text-zinc-400 text-center mt-4 max-w-xs">${currentUser.bio}</p>
        </div>
        
        <div class="grid grid-cols-3 gap-4 mt-8 text-center">
            <div><div class="text-2xl font-bold">47</div><div class="text-xs text-zinc-500">Testimonies</div></div>
            <div><div class="text-2xl font-bold">238</div><div class="text-xs text-zinc-500">Following</div></div>
            <div><div class="text-2xl font-bold">12.4k</div><div class="text-xs text-zinc-500">Reached</div></div>
        </div>
        
        <button onclick="hideProfileModal()" class="mt-10 w-full py-4 bg-zinc-700 hover:bg-zinc-600 rounded-2xl">Close Profile</button>
    `;
}

function hideProfileModal() {
    document.getElementById('profileModal').classList.add('hidden');
}

// Dummy Interactions
function likePost(id) {
    const post = posts.find(p => p.id === id);
    if (post) {
        post.likes++;
        renderPosts();
    }
}

function reportPost(id) {
    if (confirm("Report this post for review?")) {
        alert("✅ Report submitted. Thank you for protecting the Square.");
    }
}

function triggerPhotoUpload() {
    alert("📸 Media upload simulated (Camera / Gallery access would go here)");
}

function triggerVoiceRecord() {
    alert("🎙️ Voice recording started... (Web Audio API ready for implementation)");
}

// Tailwind Script
document.documentElement.style.setProperty('--tw-ring-color', '#10b981');

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    renderPosts();
});
</script>

</body>
</html>

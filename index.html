<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
                  
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="logo.png" type="image/png">
    <title>VocalWitness • Truth • Evidence • Public Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0f1c;
            color: white;
        }
        .glass {
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.25);
        }
    </style>
</head>
<body class="min-h-screen pb-20 p-4 bg-[#0a0f1c]">
    <div class="max-w-2xl mx-auto bg-red-950/30 border border-red-500/20 rounded-3xl p-4 text-xs mb-6 text-center">
        <strong data-i18n="legalLabel" class="text-red-400">Legal:</strong> 
        <span data-i18n="privacyWarning"></span>
    </div>

    <div class="max-w-2xl mx-auto">
      
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🔊</div>
                    <div>
                        <h1 data-i18n="appTitle" class="text-4xl font-bold tracking-tighter text-emerald-400">VocalWitness</h1>
                        <p data-i18n="appSubtitle" class="text-xs text-emerald-500 -mt-1">Truth • Evidence • Public Square</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <select id="languageSelector"
                        class="bg-zinc-900 border border-zinc-700 text-white px-5 py-2.5 rounded-2xl text-sm focus:outline-none focus:border-emerald-500">
                </select>
                
                <button onclick="showSupportModal()"
                        class="px-6 py-3 bg-gradient-to-r from-emerald-500 to-teal-500 text-black font-semibold rounded-2xl flex items-center gap-2 shadow-xl hover:scale-105 transition-all text-sm">
                    💚 <span data-i18n="supportPlatform">Support the Square</span>
                </button>
              
               <button id="profile-btn">View Profile</button>
            </div>
        </header>

        <nav class="flex items-center justify-between mb-6">
            <div id="main-nav" class="flex gap-2 overflow-x-auto pb-2">
                <button onclick="loadFeed('citizen')" class="nav-btn active px-5 py-2.5 rounded-2xl whitespace-nowrap" data-feed="citizen" data-i18n="citizenTalk">
                    Citizen Talk
                </button>
                <button onclick="navigateToPage('true-witness.html')" class="nav-btn px-5 py-2.5 rounded-2xl whitespace-nowrap" data-i18n="trueWitness">
                    True Witness
                </button>
                <button onclick="navigateToPage('live-arena.html')" class="nav-btn px-5 py-2.5 rounded-2xl whitespace-nowrap" data-i18n="liveArena">
                    Live Arena
                </button>
                <button onclick="navigateToPage('groups.html')" class="nav-btn px-5 py-2.5 rounded-2xl whitespace-nowrap">
                    Groups
                </button>
            </div>

            <div class="relative">
                <button onclick="toggleMoreMenu()" class="w-10 h-10 flex items-center justify-center text-2xl hover:bg-zinc-800 rounded-2xl transition-all">☰</button>
                <div id="moreMenu" class="hidden absolute right-0 mt-2 w-56 bg-zinc-900 border border-zinc-700 rounded-3xl shadow-2xl py-2 z-50">
                    <a href="moderation.html" class="block px-6 py-3 hover:bg-zinc-800">🛡️ Moderation Dashboard</a>
                    <a href="forensic-ledger.html" class="block px-6 py-3 hover:bg-zinc-800">📜 Forensic Ledger</a>
                    <a href="my-testimonies.html" class="block px-6 py-3 hover:bg-zinc-800">📝 My Testimonies</a>
                    <a href="about.html" class="block px-6 py-3 hover:bg-zinc-800">ℹ️ About</a>
                    <a href="safety.html" class="block px-6 py-3 hover:bg-zinc-800">🛡️ Safety</a>
                    <a href="privacy.html" class="block px-6 py-3 hover:bg-zinc-800">🔒 Privacy</a>
                    <a href="terms.html" class="block px-6 py-3 hover:bg-zinc-800">📜 Terms</a>
                </div>
            </div>
        </nav>

        <div class="glass rounded-3xl p-6 mb-8">
            <textarea id="mainInput" rows="3"
                      class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-white placeholder-zinc-500 focus:outline-none focus:border-emerald-500 resize-none"
                      data-i18n="placeholder"></textarea>
         
            <div class="flex gap-3 mt-6">
                <button id="btn-photo" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl transition-all flex items-center justify-center gap-3 font-medium" data-i18n="photoForensic">
                    📸 Photo + Forensic Shield
                </button>
                <button id="btn-voice" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl transition-all flex items-center justify-center gap-3 font-medium" data-i18n="voiceTestimony">
                    🎤 Voice Testimony
                </button>
            </div>
         
            <div id="preview-area" class="mt-6"></div>
         
            <button id="postButton" class="mt-8 w-full py-5 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-black font-bold text-lg rounded-3xl transition-all active:scale-95 shadow-lg" data-i18n="postButton">
                🚀 Publish Testimony to the Square
            </button>
        </div>

        <main>
            <div id="feedContainer" class="w-full"></div>
        </main>
    </div>

    <footer class="max-w-2xl mx-auto mt-20 pt-8 border-t border-zinc-800 text-center text-xs text-zinc-500">
        <div class="flex flex-wrap justify-center gap-x-6 gap-y-2 mb-6">
            <a href="about.html" class="hover:text-emerald-400 transition-colors" data-i18n="about">About</a>
            <a href="safety.html" class="hover:text-emerald-400 transition-colors" data-i18n="safety">Safety</a>
            <a href="privacy.html" class="hover:text-emerald-400 transition-colors" data-i18n="privacy">Privacy</a>
            <a href="terms.html" class="hover:text-emerald-400 transition-colors" data-i18n="terms">Terms</a>
        </div>
        <p>© 2026 VocalWitness • Built for Truth &amp; Evidence</p>
    </footer>

    <script>
        // Basic UI Functions
        function toggleMoreMenu() {
            document.getElementById('moreMenu').classList.toggle('hidden');
        }
        function navigateToPage(page) {
            window.location.href = page;
        }
        function showProfile() {
            document.getElementById('profileModal').classList.remove('hidden');
        }
        function closeProfile() {
            document.getElementById('profileModal').classList.add('hidden');
        }
        function showSupportModal() {
            document.getElementById('supportModal').classList.remove('hidden');
        }
        function initiateStewardship() {
            alert("Thank you! Stewardship is earned through contribution.\n\nVoluntary support options coming soon.");
            document.getElementById('supportModal').classList.add('hidden');
        }
        function editProfile() { alert("Edit profile coming soon"); }
        function changePassword() { alert("Password change coming soon"); }
        function showZKUpgrade() { alert("ZK Verification path coming soon"); }
        function uploadProfilePicture() { alert("Profile picture upload coming soon"); }
        function closeGroupModal() { document.getElementById('groupModal').classList.add('hidden'); }
        function createGroup() { alert("Group creation coming soon"); }
        function logout() { alert("Logged out"); window.location.reload(); }
        function closeVoteModal() { document.getElementById('voteModal').classList.add('hidden'); }

        // Close more menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.relative')) {
                const menu = document.getElementById('moreMenu');
                if (menu) menu.classList.add('hidden');
            }
        });
    </script>

        
    <script src="js/utils.js" type="module"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/firebase-init.js"></script>
    <script type="module" src="js/main.js"></script>
    
    <script>
        // Initialize everything after DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initLanguageSelector === 'function') {
                initLanguageSelector();
            }
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log("🔧 Real button handlers attached");

            // Photo
            const photoBtn = document.getElementById('btn-photo');
            if (photoBtn) photoBtn.addEventListener('click', () => {
                if (typeof window.handleImageSelect === 'function') {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = (e) => window.handleImageSelect(e, document.getElementById('preview-area'));
                    input.click();
                } else {
                    alert("Photo handler not ready yet");
                }
            });

            // Voice
            const voiceBtn = document.getElementById('btn-voice');
            if (voiceBtn) voiceBtn.addEventListener('click', () => {
                if (typeof window.toggleVoiceRecording === 'function') {
                    window.toggleVoiceRecording(voiceBtn);
                } else {
                    alert("Voice engine not ready");
                }
            });

            // Publish
            const postBtn = document.getElementById('postButton');
            if (postBtn) postBtn.addEventListener('click', () => {
                if (typeof window.publishTestimony === 'function') {
                    window.publishTestimony();
                } else {
                    alert("Publish function not ready");
                }
            });
        });
       
    </script>
   
</body>
</html>

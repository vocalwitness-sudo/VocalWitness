<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocalWitness - Truth • Evidence • Public Square</title>
    <meta name="theme-color" content="#10b981">
    
    <!-- Tailwind CDN (keep for now, replace later) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- External libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Your local CSS -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        .glass {
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(148, 163, 184, 0.12);
        }
        
        .nav-tab.active {
            background-color: #10b981;
            color: black;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgb(16 185 129 / 0.3);
        }
    </style>
</head>
<body class="min-h-screen bg-[#0a0f1c] text-slate-200 pb-24">

<!-- HEADER -->
<header class="sticky top-0 z-50 glass rounded-3xl mx-4 mt-4 p-4">
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg">🔊</div>
            <div>
                <h1 class="text-3xl font-bold tracking-tighter">VocalWitness</h1>
                <p class="text-xs text-emerald-400 tracking-[2px] -mt-1">TRUTH • EVIDENCE • PUBLIC SQUARE</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <select id="languageSelector" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-2 text-sm focus:outline-none focus:border-emerald-500">
                <option value="en">🇬🇧 English</option>
                <option value="es">🇪🇸 Español</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="de">🇩🇪 Deutsch</option>
            </select>

            <a href="privacy.html" class="flex items-center gap-2 text-emerald-400 hover:text-emerald-300 px-4 py-2 rounded-2xl hover:bg-zinc-800 transition-colors">
                <span>🔒</span> Privacy First
            </a>

            <button onclick="showSupportModal()" class="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-black font-semibold rounded-2xl transition-all">
                Support the Square
            </button>

            <button onclick="showProfileModal()" id="profileBtn"
                class="w-9 h-9 bg-zinc-700 hover:bg-zinc-600 rounded-2xl flex items-center justify-center text-xl transition-all">
                👤
            </button>

            <button onclick="showAuthModal()" id="authBtn"
                class="px-6 py-2.5 bg-white text-black font-semibold rounded-2xl hover:bg-emerald-100 transition-all">
                Sign In
            </button>
        </div>
    </div>
</header>

<!-- NAVIGATION -->
<nav class="flex gap-2 mt-6 px-4 overflow-x-auto pb-4" id="main-nav">
    <!-- Your existing nav buttons -->
    <button data-tab="square" onclick="switchTab(this)" class="nav-tab active px-6 py-3 rounded-3xl whitespace-nowrap flex flex-col items-center min-w-fit">
        <span class="font-semibold">Public Square</span>
        <span class="text-xs text-zinc-400">Testimonies</span>
    </button>
    <!-- ... other tabs ... -->
</nav>

<!-- CREATE POST -->
<div class="glass rounded-3xl p-6 mx-4 mb-8">
    <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
        <span>📝</span> Share Your Testimony
    </h2>
    
    <textarea id="postInput" rows="4" 
        class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-5 text-base placeholder-zinc-500 focus:outline-none focus:border-emerald-500 resize-none"
        placeholder="What did you witness? Be clear, honest, and detailed..."></textarea>

    <div class="flex gap-3 mt-4">
        <button onclick="triggerPhotoUpload()" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 rounded-2xl flex items-center justify-center gap-2 font-medium transition-all">
            📸 Photo / Video Evidence
        </button>
        <button onclick="triggerVoiceRecord()" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 rounded-2xl flex items-center justify-center gap-2 font-medium transition-all">
            🎤 Voice Testimony
        </button>
    </div>

    <div id="previewArea" class="hidden mt-6 border border-dashed border-zinc-600 rounded-2xl p-4 text-center text-zinc-400"></div>

    <button onclick="publishPost()" 
        class="mt-6 w-full py-5 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-black font-bold text-lg rounded-3xl transition-all active:scale-95 shadow-xl shadow-emerald-500/30">
        🚀 Publish to the Public Square
    </button>
</div>

<!-- MAIN CONTENT -->
<main id="mainContent" class="px-4 space-y-6">
    <!-- Populated by JS -->
</main>

<!-- MODALS (Support, Auth, Profile) - kept your structure -->
<!-- Support Modal -->
<div id="supportModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
    <div class="glass rounded-3xl max-w-md w-full p-8">
        <div class="text-center">
            <div class="text-6xl mb-6">🌱</div>
            <h2 class="text-3xl font-bold text-emerald-400 mb-2">Support the Square</h2>
            <p class="text-zinc-400 mb-8">Help keep truth and evidence free.</p>
            
            <div class="bg-zinc-950 p-6 rounded-2xl border border-zinc-700">
                <p class="text-xs text-zinc-500 mb-4">USDT (TRC20)</p>
                <img src="vocalwitness-qr.png" alt="QR Code" class="mx-auto rounded-2xl mb-4 w-48 h-48 object-contain">
                <code class="block bg-black p-3 rounded-xl text-emerald-300 text-sm break-all" id="walletAddr">
                    TDtka2ZxJHtnWc3sRygm7WWfJVZHbhkLtK
                </code>
                <button onclick="copyWallet()" class="mt-4 w-full py-3 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 rounded-2xl">📋 Copy Address</button>
            </div>
            
            <button onclick="hideSupportModal()" class="mt-6 w-full py-3 text-zinc-400 hover:text-white">Close</button>
        </div>
    </div>
</div>

<!-- Auth & Profile modals remain the same for now -->

<script src="js/main.js"></script>   <!-- ← Load your modular JS here -->
<script>
    // Minimal inline fallback only
    document.addEventListener('DOMContentLoaded', () => {
        console.log("✅ index.html loaded - delegating to modular JS");
        // Your modular bootstrap in main.js should take over
    });
</script>

</body>
</html>

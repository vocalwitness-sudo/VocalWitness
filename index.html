<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/logo.png" type="image/png">
    
    <title>VocalWitness • Truth • Evidence • Public Square</title>
    
    <!-- CSP (Temporary - we'll tighten later) -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self' https://checkout.flutterwave.com https://api.flutterwave.com;
        script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://www.gstatic.com https://checkout.flutterwave.com;
        style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;
        connect-src 'self' https://www.googleapis.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://api.flutterwave.com https://checkout.flutterwave.com;
        img-src 'self' data: https: blob:;
        font-src 'self' https:;
        object-src 'none';
    ">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0f1c; color: white; min-height: 100vh; }
        .glass { background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.25); contain: layout style paint; }
        #feedContainer { min-height: 500px; }
    </style>
</head>
<body class="min-h-screen pb-20 p-4 bg-[#0a0f1c]">
    <div class="max-w-2xl mx-auto">
        
        <!-- Legal Notice -->
        <div class="bg-red-950/30 border border-red-500/20 rounded-3xl p-4 text-xs mb-6 text-center">
            <strong class="text-red-400">Legal:</strong> 
            VocalWitness functions strictly as an un-manipulated decentralized distribution medium.
        </div>

        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🔊</div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tighter text-emerald-400">VocalWitness</h1>
                    <p class="text-xs text-emerald-500 -mt-1">Truth • Evidence • Public Square</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3 flex-wrap">
                <select id="languageSelector" class="bg-zinc-900 border border-zinc-700 text-white px-5 py-2.5 rounded-2xl text-sm focus:outline-none focus:border-emerald-500"></select>
                
                <button onclick="window.showSupportersModal()" class="supporter-btn px-6 py-3 rounded-2xl flex items-center gap-2 text-sm font-semibold">💚 Platform Supporters</button>
                
                <button onclick="window.initiatePlatformSupport(auth?.currentUser)" class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium">Support the Platform</button>
                
                <button onclick="window.showProfile()" class="w-11 h-11 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-3xl transition-all border border-zinc-600 flex items-center justify-center">👤</button>
            </div>
        </header>

        <!-- Navigation -->
        <nav id="main-nav" class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button onclick="window.loadFeed('citizen-talk')" class="nav-btn active px-6 py-3 rounded-3xl whitespace-nowrap" data-feed="citizen-talk">Citizen Talk</button>
            <button onclick="window.loadFeed('true-witness')" class="nav-btn px-6 py-3 rounded-3xl whitespace-nowrap" data-feed="true-witness">True Witness</button>
            <button onclick="window.loadFeed('live')" class="nav-btn px-6 py-3 rounded-3xl whitespace-nowrap" data-feed="live">Live Arena</button>
        </nav>

        <!-- Composer -->
        <div class="glass rounded-3xl p-6 mb-8">
            <textarea id="mainInput" rows="4" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-white placeholder-zinc-500 focus:outline-none focus:border-emerald-500 resize-none" placeholder="Share your raw testimony... What did you witness?"></textarea>
            
            <div class="flex gap-3 mt-6">
                <button id="btn-photo" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl transition-all flex items-center justify-center gap-3 font-medium">📸 Photo + Forensic Shield</button>
                <button id="btn-voice" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl transition-all flex items-center justify-center gap-3 font-medium">🎤 Voice Testimony</button>
            </div>
            
            <div id="preview-area" class="mt-6"></div>
            
            <button id="postButton" class="mt-8 w-full py-5 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-black font-bold text-lg rounded-3xl transition-all active:scale-95 shadow-lg">🚀 Publish Testimony to the Square</button>
        </div>

        <!-- Feed -->
        <main>
            <div id="feedContainer" class="w-full space-y-6"></div>
        </main>
    </div>

    <!-- Modals -->
    <div id="supportersModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[70]">
        <!-- Your supporters modal content here -->
    </div>

    <div id="profileModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[80]">
        <!-- Your profile modal content here -->
    </div>

    <!-- Scripts -->
    <script>
        tailwind.config = { content: ["./**/*.{html,js}"] };
        
        function showToast(message, type = "info") {
            console.log(`[${type}] ${message}`);
            alert(message); // Replace with better toast later
        }
    </script>
    
    <script type="module" src="js/main.js"></script>
</body>
</html>

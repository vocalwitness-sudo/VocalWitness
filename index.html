<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocalWitness • Truth • Evidence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0f1c; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.92); backdrop-filter: blur(24px); border: 1px solid rgba(148, 163, 184, 0.12); }
        .nav-btn { transition: all 0.2s ease; }
    </style>
</head>
<body class="min-h-screen pb-24 p-6 bg-[#0a0f1c]">

    <!-- Privacy -->
    <div class="max-w-2xl mx-auto glass rounded-3xl p-5 mb-10 text-sm">
        <strong class="text-emerald-400">Privacy First • Decentralized</strong><br>
        Your Testimony Is Yours Alone. No personal data collected.
    </div>

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <header class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-3xl">🔊</div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight text-white">VocalWitness</h1>
                    <p class="text-xs text-emerald-500">Truth • Evidence • Public Square</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="showSupportModal()" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 text-black font-medium rounded-2xl transition">Support</button>
                <button id="profile-btn" class="px-6 py-3 border border-zinc-700 hover:bg-zinc-800 rounded-2xl">Profile</button>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="flex gap-2 mb-10 overflow-x-auto pb-3">
            <button onclick="loadFeed('citizen')" class="nav-btn active px-6 py-3 rounded-2xl whitespace-nowrap">Citizen Talk</button>
            <button onclick="navigateToPage('true-witness.html')" class="nav-btn px-6 py-3 rounded-2xl whitespace-nowrap">True Witness</button>
            <button onclick="navigateToPage('live-arena.html')" class="nav-btn px-6 py-3 rounded-2xl whitespace-nowrap">Live Arena</button>
        </nav>

        <!-- Post Creation -->
        <div class="glass rounded-3xl p-8 mb-12">
            <textarea id="mainInput" rows="4" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-6 text-lg placeholder-zinc-500 focus:outline-none focus:border-emerald-500 resize-none" placeholder="What truth do you wish to share today..."></textarea>
            
            <div class="flex gap-4 mt-6">
                <button id="btn-photo" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-medium">📸 Forensic Photo</button>
                <button id="btn-voice" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-medium">🎤 Voice Testimony</button>
            </div>

            <button id="postButton" class="mt-10 w-full py-5 bg-gradient-to-r from-emerald-500 to-teal-500 text-black font-semibold text-lg rounded-3xl transition active:scale-[0.985]">
                Publish Testimony to the Square
            </button>
        </div>

        <main>
            <div id="feedContainer" class="space-y-8"></div>
        </main>
    </div>

    <!-- Floating Door -->
    <div id="door-indicator" onclick="showDoorSwitcher()" class="fixed bottom-8 right-8 glass px-6 py-4 rounded-3xl flex items-center gap-4 shadow-2xl cursor-pointer hover:border-emerald-400 transition-all">
        <span class="text-xs uppercase tracking-widest text-emerald-400">Current Door</span>
        <span id="door-name" class="font-semibold text-lg">Public Square</span>
    </div>

    <script src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="logo.png" type="image/png">
    <title data-i18n="pageTitle">VocalWitness • Truth • Evidence • Public Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0f1c; color: white; }
        .glass { background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.25); }
        .nav-btn { transition: all 0.2s; }
        .nav-btn.active { background: #10b981; color: black; font-weight: 600; }
    </style>
</head>
<body class="min-h-screen pb-20 p-4 bg-[#0a0f1c]">

    <div class="max-w-2xl mx-auto bg-amber-950/30 border border-amber-500/30 rounded-3xl p-4 text-xs mb-6 text-center">
        <strong data-i18n="legalLabel" class="text-amber-400">Important Note:</strong>
        <span data-i18n="privacyWarning"></span>
    </div>

    <div class="max-w-2xl mx-auto">
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🔊</div>
                <div>
                    <h1 data-i18n="appTitle" class="text-4xl font-bold tracking-tighter text-emerald-400">VocalWitness</h1>
                    <p data-i18n="appSubtitle" class="text-xs text-emerald-500 -mt-1">Truth • Evidence • Public Square</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <select id="languageSelector" class="bg-zinc-900 border border-zinc-700 text-white px-5 py-2.5 rounded-2xl text-sm focus:outline-none focus:border-emerald-500"></select>
                <button onclick="document.getElementById('supportModal').classList.remove('hidden')" class="px-6 py-3 bg-gradient-to-r from-emerald-500 to-teal-500 text-black font-semibold rounded-2xl flex items-center gap-2 text-sm">💚 <span data-i18n="supportPlatform">Support the Square</span></button>
                <button onclick="document.getElementById('profileModal').classList.remove('hidden')" class="w-11 h-11 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-3xl border border-zinc-600 flex items-center justify-center">👤</button>
            </div>
        </header>

        <nav class="flex items-center justify-between mb-6">
            <div id="main-nav" class="flex gap-2 overflow-x-auto pb-2">
                <button onclick="loadFeed('citizen')" class="nav-btn active px-5 py-2.5 rounded-2xl whitespace-nowrap" data-i18n="citizenTalk">Citizen Talk</button>
                <button onclick="navigateToPage('true-witness.html')" class="nav-btn px-5 py-2.5 rounded-2xl whitespace-nowrap" data-i18n="trueWitness">True Witness</button>
                <button onclick="navigateToPage('live-arena.html')" class="nav-btn px-5 py-2.5 rounded-2xl whitespace-nowrap" data-i18n="liveArena">Live Arena</button>
                <button onclick="navigateToPage('groups.html')" class="nav-btn px-5 py-2.5 rounded-2xl whitespace-nowrap" data-i18n="groups">Groups</button>
            </div>
            <div class="relative">
                <button onclick="toggleMoreMenu()" class="w-10 h-10 flex items-center justify-center text-2xl hover:bg-zinc-800 rounded-2xl">☰</button>
                <div id="moreMenu" class="hidden absolute right-0 mt-2 w-56 bg-zinc-900 border border-zinc-700 rounded-3xl shadow-2xl py-2 z-50">
                    <a href="moderation.html" class="block px-6 py-3 hover:bg-zinc-800">🛡️ Moderation Dashboard</a>
                    <a href="forensic-ledger.html" class="block px-6 py-3 hover:bg-zinc-800">📜 Forensic Ledger</a>
                    <a href="my-testimonies.html" class="block px-6 py-3 hover:bg-zinc-800">📝 My Testimonies</a>
                </div>
            </div>
        </nav>

        <div class="glass rounded-3xl p-6 mb-8">
            <textarea id="mainInput" rows="3" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-white placeholder-zinc-500 focus:outline-none focus:border-emerald-500 resize-none" data-i18n="placeholder"></textarea>
            <div class="flex gap-3 mt-6">
                <button id="btn-photo" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-medium" data-i18n="photoForensic">📸 Photo + Forensic Shield</button>
                <button id="btn-voice" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-medium" data-i18n="voiceTestimony">🎤 Voice Testimony</button>
            </div>
            <button id="postButton" class="mt-8 w-full py-5 bg-gradient-to-r from-emerald-500 to-teal-500 text-black font-bold text-lg rounded-3xl" data-i18n="postButton">🚀 Publish Testimony</button>
        </div>

        <main id="feedContainer"></main>
    </div>

    <div id="supportModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[60] p-4">
        <div class="glass rounded-3xl max-w-md w-full p-8 text-center">
            <h2 class="text-3xl font-bold text-emerald-400 mb-2" data-i18n="cultivateSquare">Cultivate the Public Square</h2>
            <button onclick="document.getElementById('supportModal').classList.add('hidden')" class="w-full py-3 text-zinc-400" data-i18n="maybeLater">Maybe later</button>
        </div>
    </div>

    <div id="profileModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[70] p-4">
        <div class="glass rounded-3xl max-w-lg w-full p-8">
            <h2 class="text-2xl font-bold mb-6" data-i18n="myDigitalPassport">My Digital Passport</h2>
            <button onclick="document.getElementById('profileModal').classList.add('hidden')" class="w-full py-3 text-red-400" data-i18n="signOut">Sign Out</button>
        </div>
    </div>

    <dialog id="recordingModal" class="bg-zinc-900 text-white rounded-3xl p-0 border border-zinc-700 w-full max-w-lg shadow-2xl">
        <div class="p-6">
            <h2 class="text-xl font-bold mb-4">Share Your Testimony</h2>
            <div id="contextStep">
                <input type="text" id="testimonyTitle" placeholder="Title/Context" class="w-full bg-zinc-800 rounded-2xl p-4 mb-4">
                <button id="startRecordingBtn" class="w-full py-4 bg-zinc-700 rounded-2xl">Start Recording</button>
            </div>
        </div>
    </dialog>

    <script type="module">
        import { initLanguage } from './js/i18n.js';
        document.addEventListener('DOMContentLoaded', () => {
            initLanguage();
            // Handle nav active states
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                });
            });
        });
        function toggleMoreMenu() { document.getElementById('moreMenu').classList.toggle('hidden'); }
        function navigateToPage(page) { window.location.href = page; }
    </script>
</body>
</html>

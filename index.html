<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocalWitness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0a0f1c;
            color: white;
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 640px;
            margin: 0 auto;
        }
        .glass {
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid #10b98130;
            border-radius: 24px;
            padding: 32px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-5xl font-bold text-center text-emerald-400 mb-2">VocalWitness</h1>
        <p class="text-center text-emerald-500 mb-10">Truth • Evidence • Public Square</p>
        
        <div class="glass">
            <textarea id="mainInput" rows="5" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-5 text-lg" placeholder="Share your raw testimony..."></textarea>
            
            <div class="flex gap-4 mt-6">
                <button id="btn-photo" class="flex-1 py-4 bg-zinc-800 rounded-2xl">📸 Photo</button>
                <button id="btn-voice" class="flex-1 py-4 bg-zinc-800 rounded-2xl">🎤 Voice</button>
            </div>
            
            <button id="postButton" class="mt-8 w-full py-5 bg-emerald-500 text-black font-bold text-xl rounded-3xl">🚀 Publish Testimony</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>

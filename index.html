<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/logo.png" type="image/png">
    <title>VocalWitness • Truth • Evidence • Public Square</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
   
    <style>
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: #0a0f1c; 
            color: white; 
        }
        .glass { 
            background: rgba(17, 24, 39, 0.95); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(16, 185, 129, 0.25); 
        }
        .nav-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-btn.active { 
            background-color: #10b981 !important; 
            color: #111827 !important; 
            font-weight: 700; 
            box-shadow: 0 10px 15px -3px rgb(16 185 129 / 0.4); 
        }
        .guardian-btn { 
            background: linear-gradient(90deg, #10b981, #34d399); 
            color: black; 
            font-weight: 700; 
        }
        .guardian-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px -5px rgb(16 185 129 / 0.6); 
        }
    </style>
</head>
<body class="min-h-screen pb-20 p-4 bg-[#0a0f1c]">

    <!-- Legal Notice -->
    <div class="max-w-2xl mx-auto bg-red-950/30 border border-red-500/20 rounded-3xl p-4 text-xs mb-6 text-center">
        <strong class="text-red-400">Legal:</strong> VocalWitness is an un-manipulated decentralized distribution medium.
    </div>

    <!-- Header -->
    <div class="max-w-2xl mx-auto">
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🔊</div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tighter text-emerald-400">VocalWitness</h1>
                    <p class="text-xs text-emerald-500 -mt-1">Truth • Evidence • Public Square</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <select id="languageSelector" aria-label="Select your language" 
                        class="bg-zinc-900 border border-zinc-700 text-white px-5 py-2.5 rounded-2xl text-sm focus:outline-none focus:border-emerald-500">
                </select>
                
                <button onclick="showSupportModal()" 
                    class="px-6 py-3 bg-gradient-to-r from-emerald-500 to-teal-500 text-black font-semibold rounded-2xl flex items-center gap-2 shadow-xl hover:scale-105 transition-all text-sm">
                    🌱 Cultivate the Square
                </button>
                
                <button onclick="showProfile()" class="w-11 h-11 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-3xl transition-all border border-zinc-600 flex items-center justify-center">👤</button>
            </div>
        </header>
    </div>

    <!-- MAIN NAVIGATION -->
    <nav class="flex items-center justify-between mb-6">
        <!-- Feed Tabs -->
        <div id="main-nav" class="flex gap-2 overflow-x-auto pb-2">
            <button onclick="loadFeed('citizen')" class="nav-btn active px-5 py-2.5 rounded-2xl whitespace-nowrap" data-feed="citizen">Citizen Talk</button>
            <button onclick="navigateToPage('true-witness.html')" class="nav-btn px-5 py-2.5 rounded-2xl whitespace-nowrap">True Witness</button>
            <button onclick="navigateToPage('live-arena.html')" class="nav-btn px-5 py-2.5 rounded-2xl whitespace-nowrap">Live Arena</button>
        </div>

        <!-- More Menu -->
        <div class="relative">
            <button onclick="toggleMoreMenu()" class="w-10 h-10 flex items-center justify-center text-2xl hover:bg-zinc-800 rounded-2xl transition-all">☰</button>
            
            <div id="moreMenu" class="hidden absolute right-0 mt-2 w-56 bg-zinc-900 border border-zinc-700 rounded-3xl shadow-2xl py-2 z-50">
                <a href="forensic-ledger.html" class="block px-6 py-3 hover:bg-zinc-800">📜 Forensic Ledger</a>
                <a href="my-testimonies.html" class="block px-6 py-3 hover:bg-zinc-800">📝 My Testimonies</a>
                <a href="about.html" class="block px-6 py-3 hover:bg-zinc-800">ℹ️ About</a>
                <a href="safety.html" class="block px-6 py-3 hover:bg-zinc-800">🛡️ Safety</a>
                <a href="privacy.html" class="block px-6 py-3 hover:bg-zinc-800">🔒 Privacy</a>
                <a href="terms.html" class="block px-6 py-3 hover:bg-zinc-800">📜 Terms</a>
            </div>
        </div>
    </nav>

    <!-- COMPOSER -->
    <div class="glass rounded-3xl p-6 mb-8">
        <textarea id="mainInput" rows="3" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 text-white placeholder-zinc-500 focus:outline-none focus:border-emerald-500 resize-none" placeholder="Share your raw testimony... What did you witness?"></textarea>
        
        <div class="flex gap-3 mt-6">
            <button id="btn-photo" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl transition-all flex items-center justify-center gap-3 font-medium">📸 Photo + Forensic Shield</button>
            <button id="btn-voice" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl transition-all flex items-center justify-center gap-3 font-medium">🎤 Voice Testimony</button>
        </div>
        
        <div id="preview-area" class="mt-6"></div>

        <button id="postButton" class="mt-8 w-full py-5 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-black font-bold text-lg rounded-3xl transition-all active:scale-95 shadow-lg">🚀 Publish Testimony to the Square</button>
    </div>

    <!-- FEED -->
    <main>
        <div id="feedContainer" class="w-full"></div>
    </main>

    <!-- Support Modal (your version) -->
    <div id="supportModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[60]">
        <!-- Your support modal content here -->
    </div>

    <!-- Profile Modal (your version) -->
    <div id="profileModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[70]">
        <!-- Your profile modal content here -->
    </div>

    <script>
        tailwind.config = { content: ["./**/*.{html,js}"] };

        // Basic functions to prevent errors
        function toggleMoreMenu() {
            const menu = document.getElementById('moreMenu');
            menu.classList.toggle('hidden');
        }

        function showSupportModal() {
            document.getElementById('supportModal').classList.remove('hidden');
        }

        function showProfile() {
            document.getElementById('profileModal').classList.remove('hidden');
        }

        function closeProfile() {
            document.getElementById('profileModal').classList.add('hidden');
        }

        function loadFeed(type) {
            console.log("Loading feed:", type);
        }

        function navigateToPage(page) {
            window.location.href = page;
        }
    </script>

    <script type="module" src="js/main.js"></script>
</body>
</html>

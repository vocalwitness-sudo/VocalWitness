<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocalWitness • Truth • Evidence • Public Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0f1c; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.92); backdrop-filter: blur(24px); border: 1px solid rgba(148, 163, 184, 0.12); }
        .nav-tab { transition: all 0.2s ease; }
        .nav-tab.active { background-color: #10b981; color: black; font-weight: 600; }
    </style>
</head>
<body class="min-h-screen pb-24 bg-[#0a0f1c]">
    <!-- Privacy Banner -->
    <div class="max-w-2xl mx-auto glass rounded-3xl p-5 mb-8 text-sm text-center">
        <strong class="text-emerald-400">Privacy First • No Personal Data Collected</strong>
    </div>

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8 sticky top-0 z-50 glass rounded-3xl p-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-2xl">🔊</div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">VocalWitness</h1>
                </div>
            </div>
            
      
            <div class="flex items-center gap-4">
                
                <select id="languageSelector" class="bg-zinc-900 text-white px-4 py-3 rounded-2xl border border-zinc-700 outline-none cursor-pointer hover:border-emerald-500 transition-all text-sm font-medium">
    <!-- Populated by JS -->
                </select>
                
                <button id="support-btn" class="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-black font-medium rounded-2xl transition">Support</button>
                <button id="profile-btn" class="px-5 py-2.5 border border-zinc-700 hover:bg-zinc-800 rounded-2xl transition">Profile</button>
            </div>
        </header>

      <!-- Main Navigation -->
<nav class="flex gap-2 mb-8 overflow-x-auto pb-3" id="main-nav">
    <button data-tab="square" class="nav-tab active px-6 py-3 rounded-3xl whitespace-nowrap">Citizen Square</button>
    <button data-tab="ledger" class="nav-tab px-6 py-3 rounded-3xl whitespace-nowrap">Broadcast Ledger</button>
    <button data-tab="arena" class="nav-tab px-6 py-3 rounded-3xl whitespace-nowrap">Live Arena</button>
    <button data-tab="mycircle" class="nav-tab px-6 py-3 rounded-3xl whitespace-nowrap">My Network</button>
    <button data-tab="witness" class="nav-tab px-6 py-3 rounded-3xl whitespace-nowrap bg-amber-900 text-amber-300">Witness Circle</button>
    <button data-tab="more" onclick="showMoreMenu()" class="nav-tab px-6 py-3 rounded-3xl whitespace-nowrap">More</button>
</nav>

        <!-- Compact Creation Bar -->
        <div class="glass rounded-3xl p-6 mb-10">
            <textarea id="mainInput" rows="3" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-5 text-lg placeholder-zinc-500 focus:outline-none focus:border-emerald-500 resize-none" placeholder="What truth do you wish to share today..."></textarea>
            
            <div class="flex gap-3 mt-4">
                <button id="btn-photo" class="flex-1 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center justify-center gap-2 font-medium">
                    📸 Forensic Photo
                </button>
                <button id="btn-voice" class="flex-1 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center justify-center gap-2 font-medium">
                    🎤 Voice Testimony
                </button>
            </div>
       
            <div id="preview-area" class="mt-6 min-h-[100px]"></div>

            <button id="postButton" class="mt-6 w-full py-4 bg-gradient-to-r from-emerald-500 to-teal-500 text-black font-semibold text-lg rounded-3xl transition active:scale-[0.985]">
                Publish to the Square
            </button>
        </div>

        <!-- Dynamic Main Content -->
        <main id="main-content">
            <div id="feedContainer" class="space-y-8"></div>
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>

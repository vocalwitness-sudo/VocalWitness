<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>VocalWitness • Truth • Evidence • Public Square</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <!-- Basic CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; connect-src 'self' https:;">
</head>
<body class="bg-[#0a0f1c] text-white min-h-screen p-4">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-4xl font-bold text-emerald-400 mb-2">VocalWitness</h1>
        <p class="text-emerald-500 mb-8">Truth • Evidence • Public Square</p>
        
        <div class="glass rounded-3xl p-6 mb-6">
            <textarea id="mainInput" rows="4" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4" placeholder="Share your raw testimony..."></textarea>
            <button id="postButton" class="mt-4 w-full py-4 bg-emerald-500 text-black font-bold rounded-2xl">Publish Testimony</button>
        </div>
        
        <div id="feedContainer" class="space-y-6"></div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocalWitness - Speak Truth • Protect Privacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen pb-28">

    <div id="toastContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] space-y-2 w-11/12 max-w-sm"></div>

    <nav class="sticky top-0 z-50 bg-[#060b16]/95 backdrop-blur-md border-b border-zinc-900 px-4 py-4">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div onclick="switchTab(0)" class="flex items-center gap-2 cursor-pointer">
                <h1 class="text-2xl font-black text-emerald-400 tracking-tight">VocalWitness</h1>
            </div>
            <!-- Your 15 Language Selector mapping perfectly to engine modules -->
            <select id="language-select" onchange="changeLanguage()" 
                class="bg-zinc-900 text-white text-sm border border-zinc-700 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                <option value="+255">🇹🇿 Swahili</option>
                <option value="+20">🇪🇬 Arabic</option>
                <option value="+252">🇸🇴 Somali</option> 
                <option value="+234-ha">🇳🇬 Hausa</option>
                <option value="+251-am">🇪🇹 Amharic</option>
                <option value="+234-yo">🇳🇬 Yoruba</option>
                <option value="+251-or">🇪🇹 Oromo</option>
                <option value="+234-ig">🇳🇬 Igbo</option>
                <option value="+27-zu">🇿🇦 Zulu</option>
                <option value="+27-xh">🇿🇦 Xhosa</option>
                
                <option value="+44">🇬🇧 English</option>
                <option value="+86">🇨🇳 Mandarin Chinese</option>
                <option value="+34">🇪🇸 Spanish</option>
                <option value="+91">🇮🇳 Hindi</option>
                <option value="+33">🇫🇷 French</option>
            </select>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4 mt-6">
        <section id="authSection" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[150] backdrop-blur-sm">
            <div class="glass max-w-sm w-full rounded-3xl p-8 text-center shadow-2xl relative border border-zinc-800 bg-[#090f1d]/90">
                <button type="button" onclick="document.getElementById('authSection').classList.add('hidden')" class="absolute top-4 right-4 text-zinc-500 hover:text-white transition-all text-lg font-bold">✕</button>
                
                <h2 id="authTitle" class="text-2xl font-black tracking-tight mb-3 text-white">Identity Verification</h2>
                <p id="authSubtitle" class="text-zinc-400 text-xs mb-8">To maintain ledger transparency, you must sign in with a verified account to interact with posts.</p>
                
                <button id="googleLoginBtn" class="w-full py-4 bg-white text-black hover:bg-zinc-100 font-bold rounded-2xl flex items-center justify-center gap-3 transition-all shadow-lg">
                    Continue with Google
                </button>
                
                <p class="text-emerald-400/80 text-center text-[11px] mt-6 tracking-wide">Secure Ledger Verification • Privacy Protected</p>
            </div>
        </section>

        <div id="mainApp" class="max-w-2xl mx-auto px-4 pt-4">
            <header class="glass rounded-3xl p-5 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="userAvatar" onclick="switchTab(2)" class="w-11 h-11 bg-emerald-500 rounded-2xl flex items-center justify-center font-black text-black text-xl cursor-pointer">V</div>
                    <div>
                        <h2 id="userName" class="font-bold">Anonymous Witness</h2>
                        <span id="userTier" class="text-xs text-emerald-400">Rising Witness</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Humanity Score</span>
                    <span id="humanityScore" class="text-2xl font-black text-emerald-400">50</span>
                </div>
            </header>

            <div id="feedViewContainer" class="space-y-6">
                <!-- "Digital Campfires" Navigation Toggles -->
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="switchFeed('streettalk')" id="streetTab" class="tab-active py-3.5 rounded-2xl font-bold text-sm">Street Talk</button>
                    <button onclick="switchFeed('vocaltruth')" id="vocalTab" class="py-3.5 rounded-2xl font-bold text-sm border border-zinc-700 text-zinc-400">Vocal Truth</button>
                </div>

                <div class="glass rounded-3xl p-5">
                    <div class="relative">
                        <textarea id="mainInput" rows="4" maxlength="500"
                            class="w-full bg-zinc-900/60 border border-zinc-800 rounded-2xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 resize-none"
                            placeholder="What did you personally witness today?"></textarea>
                        <div id="charCount" class="absolute bottom-3 right-4 text-xs text-zinc-500">0/500</div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 my-4">
                        <button onclick="triggerImageUpload()" class="py-3 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-xl text-xs font-bold tracking-wider">📸 Add Photo</button>
                        <!-- Voice Recording state handler hooked directly to production engine execution loops -->
                        <button id="voiceBtn" onclick="handleLiveVoiceToggle()" class="py-3 bg-emerald-500/10 border border-emerald-500/40 rounded-xl text-xs font-bold text-emerald-400 tracking-wider transition-all">🎤 Record Voice</button>
                    </div>

                    <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImage(event)">
                    <div id="previewArea" class="hidden mb-4 relative"></div>

                    <!-- Production Submission triggers pipeline execution directly to Firestore 'vocal_truth' -->
                    <button id="submitPostBtn" onclick="handleProductionSubmission()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-extrabold py-4 rounded-2xl text-sm tracking-widest flex items-center justify-center gap-2">
                        <span id="submitText">SHARE WITNESS</span>
                        <span id="submitSpinner" class="hidden animate-spin h-4 w-4 border-2 border-black border-t-transparent rounded-full"></span>
                    </button>
                </div>

                <div id="feed" class="space-y-4 min-h-[300px]"></div>
            </div>

            <div id="profileView" class="hidden space-y-6">
                <div class="glass rounded-3xl p-8 text-center">
                    <div class="relative mx-auto w-28 h-28 cursor-pointer" onclick="document.getElementById('profilePicInput').click()">
                        <div id="profileBigAvatar" class="w-full h-full bg-gradient-to-br from-zinc-700 to-zinc-600 rounded-3xl flex items-center justify-center text-5xl font-black overflow-hidden border-4 border-zinc-800">V</div>
                    </div>
                    <input type="file" id="profilePicInput" accept="image/*" class="hidden" onchange="handleProfilePicUpload(event)">
                    <h3 id="profileName" class="text-xl font-bold mt-4">Verified Witness</h3>
                    <p id="profileEmail" class="text-zinc-400 text-sm"></p>
                    <div id="verificationBadges" class="flex justify-center gap-2 mt-4"></div>
                </div>

                <div class="glass rounded-3xl p-6 space-y-3">
                    <button id="phoneVerifyBtn" onclick="startPhoneVerification()" class="w-full py-4 bg-white text-black rounded-2xl font-semibold">Verify Phone Number</button>
                    <button id="zkVerifyBtn" onclick="startZKVerification()" class="w-full py-4 bg-amber-500/10 border border-amber-500 text-amber-400 rounded-2xl font-semibold">Enable Zero-Knowledge</button>
                </div>
                <button onclick="logout()" class="w-full py-4 bg-red-950/30 border border-red-500/30 text-red-400 font-bold rounded-2xl">Disconnect Account</button>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 max-w-2xl mx-auto bg-[#060b16]/95 border-t border-zinc-900 backdrop-blur-lg z-50">
        <div class="grid grid-cols-2 py-3 text-center">
            <button id="navFeedBtn" onclick="switchTab(0)" class="nav-active flex flex-col items-center py-1 text-zinc-400 font-bold">Feed</button>
            <button id="navProfileBtn" onclick="switchTab(2)" class="flex flex-col items-center py-1 text-zinc-400">Profile</button>
        </div>
    </div>

    <!-- Core Runtime Script Config linking UI elements to committed vocalWitnessEngine.js -->
    <script type="module">
        import { VocalWitnessEngine } from './vocalWitnessEngine.js';

        // Tie into your active production Firebase configurations 
        // (Assuming 'db' and 'storage' are securely initialized inside your core script.js)
        let isRecordingActive = false;

        window.addEventListener('DOMContentLoaded', () => {
            if (typeof db !== 'undefined' && typeof storage !== 'undefined') {
                window.engine = new VocalWitnessEngine(db, storage);
            } else {
                // Fallback catch to ensure window object doesn't throw errors before script.js instances initialize
                setTimeout(() => {
                    if (typeof db !== 'undefined' && typeof storage !== 'undefined') {
                        window.engine = new VocalWitnessEngine(db, storage);
                    }
                }, 1000);
            }
        });

        // 1. Voice Record Toggle Handler (Direct Interface Update)
        async function handleLiveVoiceToggle() {
            const voiceBtn = document.getElementById('voiceBtn');
            if (!window.engine) return;

            if (!isRecordingActive) {
                await window.engine.startVoiceRecording();
                isRecordingActive = true;
                voiceBtn.innerText = "🛑 Stop Voice Asset";
                voiceBtn.classList.remove('bg-emerald-500/10', 'text-emerald-400', 'border-emerald-500/40');
                voiceBtn.classList.add('bg-red-500/20', 'text-red-400', 'border-red-500/50');
            } else {
                window.engine.stopVoiceRecording();
                isRecordingActive = false;
                voiceBtn.innerText = "🎤 Voice Pack Assembled";
                voiceBtn.classList.remove('bg-red-500/20', 'text-red-400', 'border-red-500/50');
                voiceBtn.classList.add('bg-zinc-800', 'text-white', 'border-zinc-600');
            }
        }

        // 2. Continuous Production Submission Pipeline (Trust Currency Automation)
        async function handleProductionSubmission() {
            const submitBtn = document.getElementById('submitPostBtn');
            const submitText = document.getElementById('submitText');
            const spinner = document.getElementById('submitSpinner');
            const selectedLanguage = document.getElementById('language-select').value;
            const currentFeedMode = document.getElementById('vocalTab').classList.contains('tab-active') ? 'vocaltruth' : 'streettalk';

            if (!window.engine) {
                alert("Database Engine initializing. Please try again in a moment.");
                return;
            }

            // Fallback user identification configuration
            let userId = "anonymous_witness_node";
            if (typeof firebase !== 'undefined' && firebase.auth().currentUser) {
                userId = firebase.auth().currentUser.uid;
            }

            try {
                submitBtn.disabled = true;
                spinner.classList.remove('hidden');
                submitText.innerText = "VERIFYING LEDGER...";

                // Uploads the encapsulated audio asset directly into the firestore 'vocal_truth' data collection
                const liveDocId = await window.engine.packageAndUploadTestimony(userId, selectedLanguage, currentFeedMode);
                
                submitText.innerText = "SHARE WITNESS";
                spinner.classList.add('hidden');
                submitBtn.disabled = false;
                
                // Triggers structural clear for input panels
                document.getElementById('mainInput').value = "";
                document.getElementById('voiceBtn').innerText = "🎤 Record Voice";
                document.getElementById('voiceBtn').className = "py-3 bg-emerald-500/10 border border-emerald-500/40 rounded-xl text-xs font-bold text-emerald-400 tracking-wider transition-all";
                
                if (typeof showToast === 'function') {
                    showToast("Testimony permanently logged onto the vocal truth ledger!");
                } else {
                    alert(`Success! Entry logged to ledger Node ID: ${liveDocId}`);
                }
            } catch (err) {
                alert(`Error uploading testimony asset: ${err.message || err}`);
                submitText.innerText = "SHARE WITNESS";
                spinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        }

        // 3. Digital Campfires Filtering Link
        function changeLanguage() {
            const selectedLanguage = document.getElementById('language-select').value;
            if (window.engine && typeof window.engine.filterFeedMode === 'function') {
                window.engine.filterFeedMode(selectedLanguage);
            }
        }

        // Pass scoping logic to window layer so HTML properties can reference functions seamlessly
        window.handleLiveVoiceToggle = handleLiveVoiceToggle;
        window.handleProductionSubmission = handleProductionSubmission;
        window.changeLanguage = changeLanguage;
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>

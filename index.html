<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>VocalWitness • Truth • Evidence • Public Square</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0f1c; color: white; }
        .glass { background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.25); }
    </style>
</head>
<body class="min-h-screen bg-[#0a0f1c] text-white p-4">
    <div class="max-w-2xl mx-auto">   <!-- This centers it -->
        
        <h1 class="text-5xl font-bold text-emerald-400 mb-2">VocalWitness</h1>
        <p class="text-emerald-500 mb-8">Truth • Evidence • Public Square</p>
        
        <div class="glass rounded-3xl p-8 mb-8">
            <textarea id="mainInput" rows="5" 
                      class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-5 text-lg placeholder-zinc-400 focus:outline-none focus:border-emerald-500" 
                      placeholder="Share your raw testimony... What did you witness?"></textarea>
            
            <div class="flex gap-4 mt-6">
                <button id="btn-photo" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl transition-all">📸 Photo</button>
                <button id="btn-voice" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl transition-all">🎤 Voice</button>
            </div>
            
            <button id="postButton" class="mt-8 w-full py-5 bg-emerald-500 hover:bg-emerald-600 text-black font-bold text-xl rounded-3xl transition-all">
                🚀 Publish Testimony
            </button>
        </div>
        
        <div id="feedContainer" class="space-y-6"></div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>

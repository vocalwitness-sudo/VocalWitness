<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocalWitness • Truth • Evidence • Public Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
</head>
<body class="min-h-screen pb-20 p-4 bg-[#0a0f1c]">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-2xl">🔊</div>
                <div>
                    <h1 class="text-3xl font-bold text-emerald-400">VocalWitness</h1>
                    <p class="text-xs text-emerald-500">Truth • Evidence</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button id="btn-guardian" class="guardian-btn px-5 py-2.5 rounded-2xl text-sm">🛡️ Guardian</button>
                <button id="btn-profile" class="w-9 h-9 bg-zinc-800 rounded-2xl flex items-center justify-center text-xl">👤</button>
            </div>
        </header>

        <!-- Language Selector (we'll improve later) -->
        <div class="flex justify-end mb-4">
            <select id="language-selector" class="bg-zinc-800 text-white px-4 py-2 rounded-2xl text-sm">
                <option value="en">English</option>
                <option value="ha">Hausa</option>
                <option value="yo">Yoruba</option>
                <option value="ig">Igbo</option>
            </select>
        </div>

        <!-- Composer -->
        <div class="glass rounded-3xl p-6 mb-8">
            <textarea id="mainInput" rows="3" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-4 placeholder-zinc-400 focus:border-emerald-500" 
                placeholder="Share your raw testimony... What did you witness?"></textarea>
            
            <div class="flex gap-3 mt-6">
                <button id="btn-photo" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">📸 Photo</button>
                <button id="btn-voice" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">🎤 Voice</button>
            </div>

            <div id="preview-area" class="mt-6"></div>

            <button id="postButton" class="mt-8 w-full py-5 bg-gradient-to-r from-emerald-500 to-teal-500 text-black font-bold rounded-3xl">
                🚀 Publish Testimony
            </button>
        </div>

        <!-- Feed -->
        <main>
            <div id="feedContainer" class="w-full"></div>
        </main>
    </div>

    <!-- Modals (Guardian + Profile) remain the same -->
    <!-- ... your existing modals ... -->

    <script type="module" src="js/main.js"></script>
</body>
</html>
